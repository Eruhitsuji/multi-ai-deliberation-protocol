$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.org/madp/schemas/session-state.schema.yaml"
title: "MADP Session State"
description: >-
  Machine-readable schema for the current logical source of truth used by
  Multi-AI Deliberation Protocol v0.2.4-draft.
type: object
additionalProperties: false
required:
  - session_state
properties:
  session_state:
    $ref: "#/$defs/sessionState"

$defs:
  identifier:
    type: string
    minLength: 1
    pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"

  nullableString:
    type:
      - string
      - "null"

  stringList:
    type: array
    items:
      type: string
      minLength: 1

  meta:
    type: object
    additionalProperties: false
    required:
      - protocol
      - protocol_version
      - session_id
      - state_version
      - parent_version
      - updated_at
      - updated_by
    properties:
      protocol:
        const: "MADP"
      protocol_version:
        type: string
        minLength: 1
      session_id:
        $ref: "#/$defs/identifier"
      state_version:
        type: integer
        minimum: 1
      parent_version:
        type: integer
        minimum: 0
      updated_at:
        anyOf:
          - const: "UNKNOWN"
          - type: string
            format: date-time
      updated_by:
        type: string
        minLength: 1
      storage_ref:
        type: string
        minLength: 1
      state_hash:
        type: string
        minLength: 1
      time_context:
        type: object
        additionalProperties: false
        properties:
          known_date:
            type: string
            format: date
          timezone:
            type: string
            minLength: 1

  language:
    type: object
    additionalProperties: false
    properties:
      interaction:
        type: string
        minLength: 2
      canonical_documents:
        type: string
        minLength: 2
      generated_artifacts:
        type: string
        minLength: 2
      schema_identifiers:
        type: string
        minLength: 2
      participant_defaults:
        type: object
        additionalProperties: false
        properties:
          prompt:
            type: string
            minLength: 2
          response:
            type: string
            minLength: 2
      translation_policy:
        type: object
        additionalProperties: false
        properties:
          canonical_language:
            type: string
            minLength: 2
          canonical_wins_on_conflict:
            type: boolean

  fixedItem:
    type: object
    additionalProperties: false
    required:
      - id
      - statement
    properties:
      id:
        $ref: "#/$defs/identifier"
      statement:
        type: string
        minLength: 1
      source:
        type: string
        minLength: 1

  condition:
    type: object
    additionalProperties: false
    required:
      - id
      - statement
      - status
    properties:
      id:
        $ref: "#/$defs/identifier"
      statement:
        type: string
        minLength: 1
      status:
        enum:
          - PENDING
          - ACTIVE
          - ADOPTED
          - SATISFIED
          - WAIVED_BY_USER
          - FAILED
          - NOT_APPLICABLE
      timing:
        enum:
          - BEFORE_START
          - BEFORE_EXECUTION
          - BEFORE_EXTERNAL_ACTION
          - BEFORE_COMPLETION
          - ONGOING
      source:
        type: string
        minLength: 1

  decision:
    type: object
    additionalProperties: false
    required:
      - id
      - status
      - summary
    properties:
      id:
        $ref: "#/$defs/identifier"
      status:
        enum:
          - CONSENSUS
          - CONDITIONAL_CONSENSUS
          - EXPERIMENT_CONSENSUS
          - USER_DECISION_REQUIRED
          - APPROVED
          - APPROVED_WITH_CONDITIONS
          - APPROVED_WITH_CHANGES
          - OPEN
          - BLOCKED
          - REJECTED
      approval_status:
        enum:
          - APPROVE
          - APPROVE_WITH_CONDITIONS
          - APPROVE_WITH_CHANGES
          - DEFER
          - REJECT
      summary:
        type: string
        minLength: 1
      approved_by:
        type: array
        items:
          type: string
          minLength: 1
      decision_conditions:
        type: array
        items:
          $ref: "#/$defs/condition"

  acceptanceCondition:
    oneOf:
      - type: string
        minLength: 1
      - type: object
        additionalProperties: false
        required:
          - condition
          - status
        properties:
          condition:
            type: string
            minLength: 1
          status:
            enum:
              - PENDING
              - SATISFIED
              - FAILED
              - NOT_APPLICABLE

  currentIssue:
    type: object
    additionalProperties: false
    required:
      - id
      - status
      - question
    properties:
      id:
        $ref: "#/$defs/identifier"
      status:
        enum:
          - IN_PROGRESS
          - USER_DECISION_REQUIRED
          - OPEN
          - BLOCKED
          - COMPLETED
          - DEFERRED
          - REJECTED
      question:
        type: string
        minLength: 1
      summary:
        type: string
        minLength: 1
      acceptance_conditions:
        type: array
        items:
          $ref: "#/$defs/acceptanceCondition"
      software:
        $ref: "#/$defs/softwareIssue"

  participant:
    type: object
    additionalProperties: false
    required:
      - actor_id
      - type
      - role
      - status
    properties:
      actor_id:
        $ref: "#/$defs/identifier"
      type:
        enum:
          - FACILITATOR
          - AI_PARTICIPANT
          - ROLE_ACTOR
          - HUMAN_OR_EXTERNAL_VALIDATOR
      role:
        type: string
        minLength: 1
      status:
        enum:
          - PROPOSED
          - AUTHORIZED
          - JOINING
          - ACTIVE
          - PAUSED
          - LEAVING
          - LEFT
          - REMOVED
          - FAILED
          - COMPLETED
      service:
        type: string
      model:
        type: string
      assigned_issues:
        type: array
        items:
          $ref: "#/$defs/identifier"
      permissions:
        type: array
        items:
          type: string
          minLength: 1

  risk:
    type: object
    additionalProperties: false
    required:
      - id
      - summary
    properties:
      id:
        $ref: "#/$defs/identifier"
      summary:
        type: string
        minLength: 1
      severity:
        enum:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
      status:
        enum:
          - OPEN
          - MITIGATED
          - ACCEPTED_BY_USER
          - CLOSED

  deferredItem:
    type: object
    additionalProperties: false
    required:
      - id
      - summary
      - reason
    properties:
      id:
        $ref: "#/$defs/identifier"
      summary:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1
      reconsider_when:
        oneOf:
          - type: "null"
          - type: string
            minLength: 1
          - type: array
            items:
              type: string
              minLength: 1
      constraints:
        $ref: "#/$defs/stringList"

  futureDirection:
    type: object
    additionalProperties: false
    required:
      - id
      - summary
      - status
    properties:
      id:
        $ref: "#/$defs/identifier"
      summary:
        type: string
        minLength: 1
      status:
        enum:
          - CONCEPT_ONLY
          - CONCEPT_APPROVED
          - PLANNED
      migration_trigger:
        $ref: "#/$defs/stringList"

  outOfScopeItem:
    type: object
    additionalProperties: false
    required:
      - id
      - summary
    properties:
      id:
        $ref: "#/$defs/identifier"
      summary:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1

  userDecisionPending:
    type: object
    additionalProperties: false
    required:
      - id
      - question
    properties:
      id:
        $ref: "#/$defs/identifier"
      question:
        type: string
        minLength: 1
      response_format:
        type: string
        minLength: 1

  internalStep:
    type: object
    additionalProperties: false
    required:
      - actor
      - task
    properties:
      actor:
        type: string
        minLength: 1
      task:
        type: string
        minLength: 1
      blocking_input:
        $ref: "#/$defs/nullableString"

  userStep:
    type: object
    additionalProperties: false
    required:
      - action_required
      - prompt_action
      - task
      - response_format
    properties:
      action_required:
        type: boolean
      prompt_action:
        enum:
          - REPLY_IN_CURRENT_CHAT
          - START_NEW_CHAT
          - CONTINUE_EXISTING_CHAT
          - JOIN_NEW_PARTICIPANT
          - RETURN_RESULT
          - TRANSFER_FACILITATOR
          - RESOLVE_STATE_CONFLICT
          - NO_ACTION_REQUIRED
      task:
        $ref: "#/$defs/nullableString"
      response_format:
        $ref: "#/$defs/nullableString"
    allOf:
      - if:
          properties:
            action_required:
              const: false
        then:
          properties:
            prompt_action:
              const: NO_ACTION_REQUIRED

  nextStep:
    type: object
    additionalProperties: false
    required:
      - internal
      - user
    properties:
      internal:
        oneOf:
          - type: "null"
          - $ref: "#/$defs/internalStep"
      user:
        $ref: "#/$defs/userStep"

  softwareIssue:
    type: object
    additionalProperties: false
    properties:
      repository:
        type: string
      branch:
        type: string
      worktree:
        type: string
      base_revision:
        type: string
      target_files:
        $ref: "#/$defs/stringList"
      related_files:
        $ref: "#/$defs/stringList"
      acceptance_criteria:
        $ref: "#/$defs/stringList"
      constraints:
        $ref: "#/$defs/stringList"
      prohibited_changes:
        $ref: "#/$defs/stringList"
      allowed_commands:
        $ref: "#/$defs/stringList"
      required_tests:
        $ref: "#/$defs/stringList"
      current_failures:
        $ref: "#/$defs/stringList"
      rollback_method:
        type: string
      write_policy:
        enum:
          - PROPOSE_ONLY
          - SINGLE_WRITER
          - ISOLATED_MULTI_WRITER

  reference:
    type: object
    additionalProperties: false
    required:
      - id
      - type
      - location
    properties:
      id:
        $ref: "#/$defs/identifier"
      type:
        type: string
        minLength: 1
      location:
        type: string
        minLength: 1
      summary:
        type: string

  reviewProfile:
    type: object
    additionalProperties: false
    properties:
      review_independence:
        enum:
          - I0
          - I1
          - I2
          - I3
      evidence_level:
        enum:
          - E0
          - E1
          - E2
          - E3
      context_isolation:
        enum:
          - C0
          - C1
          - C2
          - C3
      convergence:
        enum:
          - SAME_MODEL_CROSS_INSTANCE_CONVERGENCE
          - SAME_MODEL_CROSS_INSTANCE_DIVERGENCE
          - CROSS_MODEL_CONVERGENCE
          - CROSS_MODEL_DIVERGENCE

  usageBudget:
    type: object
    additionalProperties: false
    properties:
      scope:
        enum:
          - PER_ISSUE
          - PER_SESSION
      ai_queries:
        $ref: "#/$defs/nonNegativeCounter"
      rounds:
        $ref: "#/$defs/nonNegativeCounter"
      user_relay_actions:
        $ref: "#/$defs/nonNegativeCounter"
      chat_switches:
        $ref: "#/$defs/nonNegativeCounter"
      file_transfers:
        $ref: "#/$defs/nonNegativeCounter"

  nonNegativeCounter:
    type: object
    additionalProperties: false
    properties:
      default:
        type: integer
        minimum: 0
      maximum:
        type: integer
        minimum: 0
      used:
        type: integer
        minimum: 0

  sessionState:
    type: object
    additionalProperties: false
    required:
      - meta
      - goal
      - current_issue
      - participants
      - next_step
    properties:
      meta:
        $ref: "#/$defs/meta"
      language:
        $ref: "#/$defs/language"
      goal:
        type: string
        minLength: 1
      fixed:
        type: array
        items:
          $ref: "#/$defs/fixedItem"
      decisions:
        type: array
        items:
          $ref: "#/$defs/decision"
      open:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - summary
          properties:
            id:
              $ref: "#/$defs/identifier"
            summary:
              type: string
              minLength: 1
      current_issue:
        $ref: "#/$defs/currentIssue"
      participants:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/participant"
      critical_risks:
        type: array
        items:
          $ref: "#/$defs/risk"
      deferred_items:
        type: array
        items:
          $ref: "#/$defs/deferredItem"
      future_direction:
        type: array
        items:
          $ref: "#/$defs/futureDirection"
      out_of_scope:
        type: array
        items:
          $ref: "#/$defs/outOfScopeItem"
      user_decisions_pending:
        type: array
        items:
          $ref: "#/$defs/userDecisionPending"
      next_step:
        $ref: "#/$defs/nextStep"
      references:
        type: array
        items:
          $ref: "#/$defs/reference"
      review_profile:
        $ref: "#/$defs/reviewProfile"
      usage_budget:
        $ref: "#/$defs/usageBudget"
