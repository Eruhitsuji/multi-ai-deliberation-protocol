$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:madp:schema:validation-receipt:0.3.0-alpha.3
title: MADP v0.3.0-alpha.3 Validation Receipt
type: object
additionalProperties: false
required: [VALIDATION_RECEIPT]
properties:
  VALIDATION_RECEIPT:
    type: object
    additionalProperties: false
    required: [receipt_id, protocol_version, artifact_ref, schema_ref, executor, executed, result, errors, limitations]
    properties:
      receipt_id: {$ref: '#/$defs/id'}
      protocol_version: {const: MADP-v0.3.0-alpha.3}
      artifact_ref:
        type: object
        additionalProperties: false
        required: [artifact_type, artifact_id, artifact_locator, canonicalization, artifact_sha256]
        properties:
          artifact_type: {$ref: '#/$defs/nonEmpty'}
          artifact_id: {$ref: '#/$defs/id'}
          artifact_locator: {$ref: '#/$defs/nonEmpty'}
          artifact_revision: {type: integer, minimum: 1}
          artifact_version: {$ref: '#/$defs/nonEmpty'}
          canonicalization: {enum: [RAW_BYTES, MADP_CANONICAL_JSON_V1]}
          artifact_sha256: {$ref: '#/$defs/sha256'}
        oneOf:
          - required: [artifact_revision]
          - required: [artifact_version]
      schema_ref:
        type: object
        additionalProperties: false
        required: [path, sha256]
        properties:
          path: {$ref: '#/$defs/nonEmpty'}
          sha256: {$ref: '#/$defs/sha256'}
      executor:
        type: object
        additionalProperties: false
        required: [type, name, version]
        properties:
          type: {enum: [TOOL, DETERMINISTIC_RUNTIME, CI_WORKFLOW]}
          name: {$ref: '#/$defs/nonEmpty'}
          version: {$ref: '#/$defs/nonEmpty'}
      executed: {type: boolean}
      result: {enum: [PASS, FAIL, NOT_EXECUTED]}
      errors:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [path, message]
          properties:
            path: {type: string}
            message: {$ref: '#/$defs/nonEmpty'}
      limitations:
        type: array
        items: {$ref: '#/$defs/nonEmpty'}
    allOf:
      - if:
          properties: {result: {const: PASS}}
          required: [result]
        then:
          properties:
            executed: {const: true}
            errors: {maxItems: 0}
      - if:
          properties: {result: {const: FAIL}}
          required: [result]
        then:
          properties:
            executed: {const: true}
            errors: {minItems: 1}
      - if:
          properties: {result: {const: NOT_EXECUTED}}
          required: [result]
        then:
          properties:
            executed: {const: false}
            limitations: {minItems: 1}
$defs:
  id: {type: string, minLength: 1, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'}
  nonEmpty: {type: string, minLength: 1}
  sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
