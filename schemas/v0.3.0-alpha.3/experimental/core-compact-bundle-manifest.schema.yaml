$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:madp:schema:core-compact-bundle-manifest:0.3.0-alpha.3
title: MADP v0.3.0-alpha.3 Core Compact Bundle Manifest
type: object
additionalProperties: false
required:
  - bundle_version
  - protocol_version
  - repository
  - source_commit
  - profile
  - status
  - formal_release_evidence
  - content_format
  - bundle_file
  - bundle_sha256
  - bundle_bytes
  - source_count
  - source_inventory_sha256
  - source_files
properties:
  bundle_version:
    const: MADP-CORE-COMPACT-BUNDLE-v1
  protocol_version:
    const: MADP-v0.3.0-alpha.3
  repository:
    type: string
    pattern: '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'
  source_commit:
    type: string
    pattern: '^[0-9a-f]{40}$'
  profile:
    const: MADP_CORE_CANDIDATE
  status:
    const: EXPERIMENTAL_COMPACT_BUNDLE
  formal_release_evidence:
    const: false
  content_format:
    const: MADP-COMPACT-BUNDLE-MD-v1
  bundle_file:
    const: MADP-v0.3.0-alpha.3-core-compact.md
  bundle_sha256:
    $ref: '#/$defs/sha256'
  bundle_bytes:
    type: integer
    minimum: 1
  source_count:
    type: integer
    minimum: 1
  source_inventory_sha256:
    $ref: '#/$defs/sha256'
  source_files:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [path, role, sha256, bytes]
      properties:
        path:
          type: string
          minLength: 1
        role:
          enum:
            - PROTOCOL
            - COMMAND_REGISTRY
            - WORKFLOW_MACRO_REGISTRY
            - CORE_PROFILE
            - MACRO_PROFILE
            - BLIND_PROFILE
            - BOOTSTRAP
        sha256:
          $ref: '#/$defs/sha256'
        bytes:
          type: integer
          minimum: 0
$defs:
  sha256:
    type: string
    pattern: '^[0-9a-f]{64}$'
