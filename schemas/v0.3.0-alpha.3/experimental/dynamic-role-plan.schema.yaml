$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:madp:schema:dynamic-role-plan:0.3.0-alpha.3
title: MADP v0.3.0-alpha.3 Dynamic Role Plan
type: object
additionalProperties: false
required:
  - plan_version
  - protocol_version
  - plan_id
  - status
  - formal_release_evidence
  - human_final_authority
  - approval_authority_granted
  - task
  - services
  - assignments
  - blind_first_round
  - unfilled_roles
  - warnings
  - planner
properties:
  plan_version:
    const: MADP-DYNAMIC-ROLE-PLAN-v1
  protocol_version:
    const: MADP-v0.3.0-alpha.3
  plan_id:
    $ref: '#/$defs/id'
  status:
    enum: [DRAFT, READY, DEGRADED]
  formal_release_evidence:
    const: false
  human_final_authority:
    const: true
  approval_authority_granted:
    const: false
  task:
    $ref: '#/$defs/task'
  services:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/service'
  assignments:
    type: array
    items:
      $ref: '#/$defs/assignment'
  blind_first_round:
    $ref: '#/$defs/blindPlan'
  unfilled_roles:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/role'
  warnings:
    type: array
    items:
      type: string
      minLength: 1
  planner:
    type: object
    additionalProperties: false
    required: [algorithm, deterministic, tie_breaker]
    properties:
      algorithm:
        const: MADP-DYNAMIC-ROLE-PLANNER-v1
      deterministic:
        const: true
      tie_breaker:
        const: SERVICE_ID_ASCENDING
$defs:
  id:
    type: string
    minLength: 1
    pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'
  role:
    enum: [FACILITATOR, PROPOSER, CRITIC, EVIDENCE_REVIEWER, RECORDER]
  task:
    type: object
    additionalProperties: false
    required: [task_id, title, required_roles, blind_first_round_required, blind_initial_response_count]
    properties:
      task_id:
        $ref: '#/$defs/id'
      title:
        type: string
        minLength: 1
      required_roles:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: '#/$defs/role'
      blind_first_round_required:
        type: boolean
      blind_initial_response_count:
        type: integer
        minimum: 0
        maximum: 10
  capabilities:
    type: object
    additionalProperties: false
    required: [facilitation, generation, critique, evidence_review, recording, exact_file_reading, web_research, code_execution, long_context]
    properties:
      facilitation: {type: boolean}
      generation: {type: boolean}
      critique: {type: boolean}
      evidence_review: {type: boolean}
      recording: {type: boolean}
      exact_file_reading: {type: boolean}
      web_research: {type: boolean}
      code_execution: {type: boolean}
      long_context: {type: boolean}
  service:
    type: object
    additionalProperties: false
    required:
      - service_id
      - provider
      - model_label
      - chat_context_id
      - independence_group
      - availability
      - usage_preference
      - cost_mode
      - capabilities
      - known_correlations
    properties:
      service_id:
        $ref: '#/$defs/id'
      provider:
        type: string
        minLength: 1
      model_label:
        type: string
        minLength: 1
      chat_context_id:
        $ref: '#/$defs/id'
      independence_group:
        $ref: '#/$defs/id'
      availability:
        enum: [AVAILABLE, LIMITED, UNAVAILABLE]
      usage_preference:
        enum: [PREFER, NORMAL, MINIMIZE]
      cost_mode:
        enum: [FREE, SUBSCRIPTION, METERED, UNKNOWN]
      capabilities:
        $ref: '#/$defs/capabilities'
      known_correlations:
        type: array
        uniqueItems: true
        items:
          $ref: '#/$defs/id'
  assignment:
    type: object
    additionalProperties: false
    required: [assignment_id, role, service_id, phase, authority, independent_count_eligible, rationale]
    properties:
      assignment_id:
        $ref: '#/$defs/id'
      role:
        $ref: '#/$defs/role'
      service_id:
        $ref: '#/$defs/id'
      phase:
        enum: [BLIND_INITIAL, CROSS_EXPOSURE, INTEGRATION, ALL]
      authority:
        enum: [PROPOSE_ONLY, OPINION_ONLY, RECORD_ONLY]
      independent_count_eligible:
        type: boolean
      rationale:
        type: string
        minLength: 1
  blindPlan:
    type: object
    additionalProperties: false
    required:
      - required
      - status
      - requested_response_count
      - assigned_service_ids
      - eligible_service_ids
      - independence_group_count
      - reasons
    properties:
      required:
        type: boolean
      status:
        enum: [PLAN_VALID, PLAN_DEGRADED, NOT_REQUIRED]
      requested_response_count:
        type: integer
        minimum: 0
        maximum: 10
      assigned_service_ids:
        type: array
        uniqueItems: true
        items:
          $ref: '#/$defs/id'
      eligible_service_ids:
        type: array
        uniqueItems: true
        items:
          $ref: '#/$defs/id'
      independence_group_count:
        type: integer
        minimum: 0
      reasons:
        type: array
        items:
          type: string
          minLength: 1
