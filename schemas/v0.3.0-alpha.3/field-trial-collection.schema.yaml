$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:madp:schema:field-trial-collection:0.3.0-alpha.3
title: MADP v0.3.0-alpha.3 Field-Trial Collection Package
type: object
additionalProperties: false
required:
  - collection_package_version
  - protocol_version
  - status
  - participant
  - validation_receipts
  - run_evidence
  - scenario_results
  - normalizations
properties:
  collection_package_version: {const: MADP-FIELD-TRIAL-COLLECTION-v1}
  protocol_version: {const: MADP-v0.3.0-alpha.3}
  status: {enum: [DRAFT, READY]}
  participant: {$ref: '#/$defs/participant'}
  validation_receipts:
    type: array
    minItems: 1
    items:
      type: object
      required: [VALIDATION_RECEIPT]
  run_evidence: {$ref: '#/$defs/runEvidence'}
  scenario_results:
    type: array
    minItems: 8
    maxItems: 8
    items: {$ref: '#/$defs/scenarioDraft'}
  normalizations:
    type: array
    uniqueItems: true
    items:
      enum:
        - REBUILT_VALIDATION_RECEIPT_REFERENCE_SET
allOf:
  - if:
      properties:
        status: {const: READY}
      required: [status]
    then:
      properties:
        scenario_results:
          items: {$ref: '#/$defs/scenarioReady'}
$defs:
  id:
    type: string
    minLength: 1
    pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'
  nonEmpty: {type: string, minLength: 1}
  sha40: {type: string, pattern: '^[0-9a-f]{40}$'}
  sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
  nullableBoolean:
    oneOf:
      - {type: boolean}
      - {type: 'null'}
  nullableInteger:
    oneOf:
      - {type: integer, minimum: 0}
      - {type: 'null'}
  nullableString:
    oneOf:
      - {type: string}
      - {type: 'null'}
  participant:
    type: object
    additionalProperties: false
    required: [participant_id, client, displayed_model_label, reasoning_mode]
    properties:
      participant_id: {$ref: '#/$defs/id'}
      client: {$ref: '#/$defs/nonEmpty'}
      displayed_model_label: {$ref: '#/$defs/nonEmpty'}
      reasoning_mode: {$ref: '#/$defs/nonEmpty'}
      tool_notes: {type: string}
  observation:
    type: object
    additionalProperties: false
    required: [observation_id, kind, path, sha256]
    properties:
      observation_id: {$ref: '#/$defs/id'}
      kind:
        enum:
          - PRIMARY_CHAT
          - RELAY_PACKET
          - RELAY_RAW_RESPONSE
          - SESSION_EXPORT
          - IMPORT_CHAT
          - LOAD_REPORT
          - OTHER
      path: {$ref: '#/$defs/nonEmpty'}
      sha256: {$ref: '#/$defs/sha256'}
  startProfileBinding:
    type: object
    additionalProperties: false
    required: [repository, repository_commit, path, source_ref, source_inventory_digest, content_sha256]
    properties:
      repository: {const: Eruhitsuji/multi-ai-deliberation-protocol}
      repository_commit: {$ref: '#/$defs/sha40'}
      path: {enum: [bootstrap/alpha3/quick-start.md, bootstrap/alpha3/verified-start.md]}
      source_ref: {$ref: '#/$defs/nonEmpty'}
      source_inventory_digest: {$ref: '#/$defs/sha256'}
      content_sha256: {$ref: '#/$defs/sha256'}
  runEvidence:
    type: object
    additionalProperties: false
    required:
      - run_id
      - participant_id
      - run_index
      - tested_commit
      - protocol_load_report
      - protocol_load_report_receipt_id
      - start_profile_binding
      - observations
    properties:
      run_id: {$ref: '#/$defs/id'}
      participant_id: {$ref: '#/$defs/id'}
      run_index: {type: integer, minimum: 1}
      tested_commit: {$ref: '#/$defs/sha40'}
      protocol_load_report:
        type: object
        minProperties: 1
      protocol_load_report_receipt_id: {$ref: '#/$defs/id'}
      start_profile_binding: {$ref: '#/$defs/startProfileBinding'}
      observations:
        type: array
        minItems: 1
        items: {$ref: '#/$defs/observation'}
  scenarioBase:
    type: object
    additionalProperties: false
    required:
      - trial_id
      - run_id
      - scenario_id
      - observation_refs
      - task_completed
      - next_action_understood
      - recovery_attempts
      - eligible_workflow_transitions
      - unnecessary_user_pauses
      - critical_authority_errors
      - critical_unnecessary_pauses
      - expected_behavior
      - actual_behavior
      - reviewer
      - notes
    properties:
      trial_id: {$ref: '#/$defs/id'}
      run_id: {$ref: '#/$defs/id'}
      scenario_id:
        enum:
          - USAB-QUICK-001
          - USAB-COMMAND-COMPAT-001
          - USAB-RELAY-001
          - USAB-LIMITED-001
          - USAB-RECOVERY-001
          - USAB-TEAM-001
          - USAB-MINUTES-001
          - USAB-HELP-001
      observation_refs:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/id'}
      task_completed: {$ref: '#/$defs/nullableBoolean'}
      next_action_understood: {$ref: '#/$defs/nullableBoolean'}
      recovery_attempts: {$ref: '#/$defs/nullableInteger'}
      eligible_workflow_transitions: {$ref: '#/$defs/nullableInteger'}
      unnecessary_user_pauses: {$ref: '#/$defs/nullableInteger'}
      critical_authority_errors: {$ref: '#/$defs/nullableInteger'}
      critical_unnecessary_pauses: {$ref: '#/$defs/nullableInteger'}
      expected_behavior: {$ref: '#/$defs/nullableString'}
      actual_behavior: {$ref: '#/$defs/nullableString'}
      reviewer: {$ref: '#/$defs/nullableString'}
      notes: {$ref: '#/$defs/nullableString'}
  scenarioDraft:
    $ref: '#/$defs/scenarioBase'
  scenarioReady:
    allOf:
      - {$ref: '#/$defs/scenarioBase'}
      - type: object
        properties:
          observation_refs:
            type: array
            minItems: 1
          task_completed: {type: boolean}
          next_action_understood: {type: boolean}
          recovery_attempts: {type: integer, minimum: 0}
          eligible_workflow_transitions: {type: integer, minimum: 0}
          unnecessary_user_pauses: {type: integer, minimum: 0}
          critical_authority_errors: {type: integer, minimum: 0}
          critical_unnecessary_pauses: {type: integer, minimum: 0}
          expected_behavior: {$ref: '#/$defs/nonEmpty'}
          actual_behavior: {$ref: '#/$defs/nonEmpty'}
          reviewer: {$ref: '#/$defs/nonEmpty'}
          notes: {type: string}
