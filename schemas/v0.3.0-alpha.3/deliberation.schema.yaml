$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "urn:madp:schema:deliberation:0.3.0-alpha.3"
title: "MADP v0.3.0-alpha.3 Deliberation Artifacts"
type: object
additionalProperties: false
minProperties: 1
maxProperties: 1
oneOf:
  - required: [deliberation_plan]
  - required: [participant_profile]
  - required: [plain_relay_packet]
  - required: [response_ingest_record]
  - required: [normalization_record]
  - required: [role_assignment_plan]
  - required: [claim_ledger]
  - required: [next_action_card]
  - required: [session_minutes]
  - required: [help_context_packet]
  - required: [help_response]
properties:
  deliberation_plan: {$ref: "#/$defs/deliberationPlan"}
  participant_profile: {$ref: "#/$defs/participantProfile"}
  plain_relay_packet: {$ref: "#/$defs/plainRelayPacket"}
  response_ingest_record: {$ref: "#/$defs/responseIngestRecord"}
  normalization_record: {$ref: "#/$defs/normalizationRecord"}
  role_assignment_plan: {$ref: "#/$defs/roleAssignmentPlan"}
  claim_ledger: {$ref: "#/$defs/claimLedger"}
  next_action_card: {$ref: "#/$defs/nextActionCard"}
  session_minutes: {$ref: "#/$defs/sessionMinutes"}
  help_context_packet: {$ref: "#/$defs/helpContextPacket"}
  help_response: {$ref: "#/$defs/helpResponse"}

$defs:
  id:
    type: string
    minLength: 1
    pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
  nonEmpty:
    type: string
    minLength: 1
  strings:
    type: array
    items: {$ref: "#/$defs/nonEmpty"}
  protocolVersion:
    const: "MADP-v0.3.0-alpha.3"
  authorityBoundary:
    enum: [REFERENCE_ONLY, PROPOSE_ONLY, REQUIRES_USER_CONFIRMATION, USER_CONFIRMED, DENIED]
  participantType:
    enum: [HUMAN, AI_MODEL, AI_ROLE_ACTOR, TEAM_PROXY, OBSERVER]
  participantMode:
    enum: [FULL_CONFORMANCE, ASSISTED_CONFORMANCE, OPINION_ONLY, OBSERVER]

  deliberationPlan:
    type: object
    additionalProperties: false
    required: [plan_id, protocol_version, mode, topic, primary_goal, central_question, final_outputs, success_criteria, in_scope, out_of_scope, goal_gate, goal_status, decision_authority, silence_counts_as_consent, preserve_material_dissent, stop_conditions, authority_boundary]
    properties:
      plan_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      mode: {enum: [LIGHT, STANDARD, ASSURED]}
      topic: {$ref: "#/$defs/nonEmpty"}
      primary_goal: {$ref: "#/$defs/nonEmpty"}
      central_question: {$ref: "#/$defs/nonEmpty"}
      final_outputs: {$ref: "#/$defs/strings"}
      success_criteria: {$ref: "#/$defs/strings"}
      in_scope: {$ref: "#/$defs/strings"}
      out_of_scope: {$ref: "#/$defs/strings"}
      goal_gate: {enum: [OPTIONAL, REQUIRED]}
      goal_status: {enum: [PENDING, USER_CONFIRMED, AMENDMENT_PENDING]}
      revision: {type: integer, minimum: 1}
      decision_authority: {$ref: "#/$defs/nonEmpty"}
      decision_method: {enum: [SINGLE_DECISION_OWNER, NAMED_APPROVERS, UNANIMOUS, MAJORITY, CONSENT_BASED, ADVISORY_ONLY, EXTERNAL_GOVERNANCE]}
      named_approvers: {$ref: "#/$defs/strings"}
      silence_counts_as_consent: {const: false}
      preserve_material_dissent: {const: true}
      stop_conditions: {$ref: "#/$defs/strings"}
      authority_boundary: {$ref: "#/$defs/authorityBoundary"}

  participantProfile:
    type: object
    additionalProperties: false
    required: [participant_id, protocol_version, participant_type, participation_mode, participation_channel, capabilities, independence_group, eligible_roles, ineligible_roles, authority]
    properties:
      participant_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      participant_type: {$ref: "#/$defs/participantType"}
      display_name: {type: string}
      participation_mode: {$ref: "#/$defs/participantMode"}
      participation_channel: {enum: [DIRECT_CHAT, RELAYED_BY_HUMAN, EXTERNAL_MEETING, IMPORTED_MINUTES, ASYNCHRONOUS_COMMENT]}
      capabilities:
        type: object
        additionalProperties: false
        required: [url_reading, file_upload, zip_reading, yaml_input, yaml_output, free_text_input, free_text_output]
        properties:
          url_reading: {enum: [true, false, UNKNOWN]}
          file_upload: {enum: [true, false, UNKNOWN]}
          zip_reading: {enum: [true, false, UNKNOWN]}
          yaml_input: {enum: [true, false, UNKNOWN]}
          yaml_output: {enum: [true, false, UNKNOWN]}
          free_text_input: {enum: [true, false, UNKNOWN]}
          free_text_output: {enum: [true, false, UNKNOWN]}
      independence_group: {$ref: "#/$defs/id"}
      independence_level: {enum: [I0, I1, I2, UNKNOWN]}
      eligible_roles: {$ref: "#/$defs/strings"}
      ineligible_roles: {$ref: "#/$defs/strings"}
      authority:
        type: object
        additionalProperties: false
        required: [may_propose, may_approve, may_veto, may_execute, may_update_canonical_state]
        properties:
          may_propose: {type: boolean}
          may_approve: {type: boolean}
          may_veto: {type: boolean}
          may_execute: {type: boolean}
          may_update_canonical_state: {type: boolean}

  plainRelayPacket:
    type: object
    additionalProperties: false
    required: [packet_id, protocol_version, target_participant, participant_mode, topic, assigned_role, context_summary, questions, prohibited_inferences, requested_response_format, return_destination, authority_boundary]
    properties:
      packet_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      source_state_version: {type: integer, minimum: 0}
      target_participant: {$ref: "#/$defs/id"}
      participant_mode: {enum: [ASSISTED_CONFORMANCE, OPINION_ONLY]}
      topic: {$ref: "#/$defs/nonEmpty"}
      assigned_role: {$ref: "#/$defs/nonEmpty"}
      context_summary: {$ref: "#/$defs/strings"}
      questions: {$ref: "#/$defs/strings"}
      prohibited_inferences:
        type: array
        minItems: 3
        allOf:
          - contains: {const: USER_APPROVAL}
          - contains: {const: EXECUTION_PERMISSION}
          - contains: {const: CANONICAL_STATE_AUTHORITY}
        items: {enum: [USER_APPROVAL, EXECUTION_PERMISSION, CANONICAL_STATE_AUTHORITY, VERIFIED_EVIDENCE, HIGH_CONFIDENCE]}
      requested_response_format: {enum: [FREE_TEXT, NUMBERED_LIST, SIMPLE_HEADINGS]}
      return_destination: {$ref: "#/$defs/nonEmpty"}
      authority_boundary: {const: PROPOSE_ONLY}

  responseIngestRecord:
    type: object
    additionalProperties: false
    required: [ingest_id, protocol_version, participant_id, raw_response_ref, requested_format, observed_format, exact_parse_status, validation_status, recovery_attempted, recovery_method, ambiguity_status, disposition, authority_preserved]
    properties:
      ingest_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      participant_id: {$ref: "#/$defs/id"}
      source_state_version: {type: integer, minimum: 0}
      raw_response_ref: {$ref: "#/$defs/nonEmpty"}
      requested_format: {$ref: "#/$defs/nonEmpty"}
      observed_format: {enum: [YAML, JSON, MARKDOWN_PROSE, FREE_TEXT, NUMBERED_LIST, TRUNCATED, UNKNOWN]}
      exact_parse_status: {enum: [PASS, FAIL, NOT_APPLICABLE]}
      validation_status: {enum: [SCHEMA_VALID, SCHEMA_INVALID, NOT_VALIDATED, NOT_APPLICABLE]}
      parse_errors: {$ref: "#/$defs/strings"}
      recovery_attempted: {type: boolean}
      recovery_method: {enum: [NONE, REQUEST_REFORMAT, FACILITATOR_NORMALIZATION, USER_CONFIRMATION, DOWNGRADE_TO_OPINION_ONLY]}
      ambiguity_status: {enum: [NONE, PRESENT, MATERIAL]}
      ambiguity_items: {$ref: "#/$defs/strings"}
      disposition: {enum: [ACCEPTED_CONFORMANT, ACCEPTED_NORMALIZED, ACCEPTED_OPINION_ONLY, QUARANTINED_AMBIGUOUS, REJECTED_UNUSABLE, STALE_RESPONSE]}
      authority_preserved: {const: true}

  normalizationRecord:
    type: object
    additionalProperties: false
    required: [normalization_id, protocol_version, source_participant, raw_response_ref, normalized_by, transformations, omitted_as_ambiguous, added_content, confirmation_status, authority_status_added]
    properties:
      normalization_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      source_participant: {$ref: "#/$defs/id"}
      raw_response_ref: {$ref: "#/$defs/nonEmpty"}
      normalized_by: {$ref: "#/$defs/id"}
      transformations:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [source_text, normalized_statement, classification]
          properties:
            source_text: {$ref: "#/$defs/nonEmpty"}
            normalized_statement: {$ref: "#/$defs/nonEmpty"}
            classification: {enum: [FACT, SOURCE_CLAIM, MODEL_INFERENCE, PROPOSAL, OPINION]}
      omitted_as_ambiguous: {$ref: "#/$defs/strings"}
      added_content: {const: false}
      confirmation_status: {enum: [UNCONFIRMED, SOURCE_CONFIRMED, USER_CONFIRMED]}
      authority_status_added: {const: false}

  roleAssignmentPlan:
    type: object
    additionalProperties: false
    required: [assignment_id, protocol_version, assignment_policy, issue_id, role_budget, roles, authority_roles_changed]
    properties:
      assignment_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      assignment_policy: {enum: [FIXED, ADAPTIVE]}
      issue_id: {$ref: "#/$defs/id"}
      role_budget:
        type: object
        additionalProperties: false
        required: [preferred_active_roles, maximum_active_roles]
        properties:
          preferred_active_roles: {type: integer, minimum: 1}
          maximum_active_roles: {type: integer, minimum: 1, maximum: 12}
      roles:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [role_id, function, participant_id, reason, status, required_capabilities, retirement_condition]
          properties:
            role_id: {$ref: "#/$defs/id"}
            function: {$ref: "#/$defs/nonEmpty"}
            participant_id: {$ref: "#/$defs/id"}
            reason: {$ref: "#/$defs/nonEmpty"}
            status: {enum: [PROPOSED, ACTIVE, PAUSED, RETIRED, REASSIGNED]}
            required_capabilities: {$ref: "#/$defs/strings"}
            retirement_condition: {$ref: "#/$defs/nonEmpty"}
      authority_roles_changed: {const: false}

  claimLedger:
    type: object
    additionalProperties: false
    required: [ledger_id, protocol_version, claims]
    properties:
      ledger_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      claims:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [claim_id, statement, claim_type, importance, verification_status, source_refs, checked_by, disagreements, usable_for_decision]
          properties:
            claim_id: {$ref: "#/$defs/id"}
            statement: {$ref: "#/$defs/nonEmpty"}
            claim_type: {enum: [FACT, SOURCE_CLAIM, MODEL_INFERENCE, PROPOSAL, OPINION]}
            importance: {enum: [LOW, MEDIUM, HIGH, CRITICAL]}
            verification_status: {enum: [UNVERIFIED, PARTIAL, VERIFIED, CONTRADICTED, NOT_APPLICABLE]}
            source_refs: {$ref: "#/$defs/strings"}
            supporting_claim_refs: {$ref: "#/$defs/strings"}
            assumptions: {$ref: "#/$defs/strings"}
            risks: {$ref: "#/$defs/strings"}
            checked_by: {$ref: "#/$defs/strings"}
            disagreements: {$ref: "#/$defs/strings"}
            usable_for_decision: {type: boolean}

  nextActionCard:
    type: object
    additionalProperties: false
    required: [card_id, protocol_version, state, pause_reason, action_required, actor, current_location, primary_action, accepted_inputs, after_completion, alternatives]
    properties:
      card_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      state: {$ref: "#/$defs/nonEmpty"}
      pause_reason: {enum: [USER_DECISION_REQUIRED, MISSING_REQUIRED_INFORMATION, EXTERNAL_RELAY_REQUIRED, SAFETY_OR_AUTHORITY_BOUNDARY, MULTIPLE_MATERIAL_PATHS_REQUIRE_CHOICE, BUDGET_OR_LENGTH_LIMIT]}
      action_required: {type: boolean}
      actor: {enum: [USER, NAMED_HUMAN, EXTERNAL_PARTICIPANT]}
      current_location: {$ref: "#/$defs/nonEmpty"}
      progress: {type: string}
      primary_action:
        type: object
        additionalProperties: false
        required: [label, instruction]
        properties:
          label: {$ref: "#/$defs/nonEmpty"}
          instruction: {$ref: "#/$defs/nonEmpty"}
      accepted_inputs: {$ref: "#/$defs/strings"}
      after_completion: {$ref: "#/$defs/strings"}
      alternatives: {$ref: "#/$defs/strings"}

  sessionMinutes:
    type: object
    additionalProperties: false
    required: [minutes_id, protocol_version, session_id, source_state_version, generated_by, status, detail_level, participants, agenda, executive_summary, discussion, decisions, dissent, action_items, unresolved_points, limitations]
    properties:
      minutes_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      session_id: {$ref: "#/$defs/id"}
      source_state_version: {type: integer, minimum: 0}
      generated_by: {$ref: "#/$defs/id"}
      status: {enum: [AUTO_GENERATED_DRAFT, HUMAN_REVIEW_PENDING, HUMAN_REVIEWED, APPROVED_RECORD, SUPERSEDED]}
      detail_level: {enum: [QUICK, STANDARD, AUDIT]}
      participants: {$ref: "#/$defs/strings"}
      agenda: {$ref: "#/$defs/strings"}
      executive_summary: {$ref: "#/$defs/strings"}
      discussion:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [issue_id, topic, main_positions, evidence_refs]
          properties:
            issue_id: {$ref: "#/$defs/id"}
            topic: {$ref: "#/$defs/nonEmpty"}
            main_positions: {$ref: "#/$defs/strings"}
            evidence_refs: {$ref: "#/$defs/strings"}
      decisions:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [decision_id, statement, approval_status, approved_by]
          properties:
            decision_id: {$ref: "#/$defs/id"}
            statement: {$ref: "#/$defs/nonEmpty"}
            approval_status: {enum: [PROPOSED, PENDING, APPROVED, REJECTED, DEFERRED]}
            approved_by: {$ref: "#/$defs/strings"}
      dissent: {$ref: "#/$defs/strings"}
      action_items:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [action_id, description, owner, status]
          properties:
            action_id: {$ref: "#/$defs/id"}
            description: {$ref: "#/$defs/nonEmpty"}
            owner: {$ref: "#/$defs/nonEmpty"}
            due_date: {type: [string, "null"]}
            status: {enum: [OPEN, IN_PROGRESS, BLOCKED, DONE, DEFERRED]}
      unresolved_points: {$ref: "#/$defs/strings"}
      redactions: {$ref: "#/$defs/strings"}
      limitations: {$ref: "#/$defs/strings"}

  helpContextPacket:
    type: object
    additionalProperties: false
    required: [help_request_id, protocol_version, usage_mode, current_phase, problem_category, problem_description, requested_help, authority_boundary]
    properties:
      help_request_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      usage_mode: {enum: [SINGLE_CHAT, MULTI_CHAT, MULTI_MODEL, TEAM]}
      current_phase: {$ref: "#/$defs/nonEmpty"}
      current_state_version: {type: integer, minimum: 0}
      problem_category: {enum: [GETTING_STARTED, NEXT_ACTION_UNKNOWN, BOOTSTRAP_FAILURE, MALFORMED_RESPONSE, LIMITED_AI_PARTICIPATION, ROLE_ASSIGNMENT, TEAM_AUTHORITY, MINUTES, EXTERNAL_RELAY, STATE_RECOVERY, COMMAND_USAGE, VERSION_COMPATIBILITY, PROTOCOL_INTERPRETATION]}
      problem_description: {$ref: "#/$defs/nonEmpty"}
      available_information: {$ref: "#/$defs/strings"}
      excluded_information: {$ref: "#/$defs/strings"}
      requested_help: {$ref: "#/$defs/strings"}
      authority_boundary: {const: REFERENCE_ONLY}

  helpResponse:
    type: object
    additionalProperties: false
    required: [help_response_id, protocol_version, diagnosis, next_action, warnings, alternatives, canonical_state_modified, decision_authority_used, execution_authority_used]
    properties:
      help_response_id: {$ref: "#/$defs/id"}
      protocol_version: {$ref: "#/$defs/protocolVersion"}
      diagnosis: {$ref: "#/$defs/nonEmpty"}
      next_action:
        type: object
        additionalProperties: false
        required: [actor, action, destination]
        properties:
          actor: {enum: [USER, NAMED_HUMAN]}
          action: {$ref: "#/$defs/nonEmpty"}
          destination: {$ref: "#/$defs/nonEmpty"}
      warnings: {$ref: "#/$defs/strings"}
      alternatives: {$ref: "#/$defs/strings"}
      canonical_state_modified: {const: false}
      decision_authority_used: {const: false}
      execution_authority_used: {const: false}
