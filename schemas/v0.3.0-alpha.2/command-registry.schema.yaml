$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "urn:madp:schema:command-registry:0.3.0-alpha.2"
title: "MADP Command Registry v0.3.0-alpha.2"
description: "Draft registry schema for MADP command names, command classes, required arguments, argument cardinality, and default authority boundaries."
type: object
additionalProperties: false
required:
  - registry_version
  - protocol_version
  - status
  - commands
properties:
  registry_version:
    const: "MADP-COMMAND-REGISTRY-v0.1"
  protocol_version:
    const: "MADP-v0.3.0-alpha.2"
  status:
    const: "draft"
  commands:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/commandDefinition"

$defs:
  identifier:
    type: string
    minLength: 1
    pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
  stringList:
    type: array
    items:
      type: string
      minLength: 1
    uniqueItems: true
  commandName:
    enum:
      - share-context
      - issue-relay
      - request-review
      - summarize-state
      - check-authority
      - propose-decision
      - approve
      - reject
      - defer
      - prioritize
      - pause
      - resume
      - status
      - todo-add
      - todo-list
      - todo-update
      - todo-done
      - todo-defer
      - todo-promote
      - external-action
  commandClass:
    enum:
      - AI_COMMAND
      - USER_COMMAND
      - TODO_COMMAND
      - EXTERNAL_ACTION_COMMAND
  authorityBoundary:
    enum:
      - REFERENCE_ONLY
      - PROPOSE_ONLY
      - REQUIRES_USER_CONFIRMATION
      - USER_CONFIRMED
      - DENIED
  argumentDefinition:
    type: object
    additionalProperties: false
    required: [name, required, description]
    properties:
      name:
        $ref: "#/$defs/identifier"
      required:
        type: boolean
      description:
        type: string
        minLength: 1
      cardinality:
        enum: [SCALAR, LIST]
        default: SCALAR
      allowed_values:
        $ref: "#/$defs/stringList"
      default:
        type: [string, integer, boolean, "null"]
  commandDefinition:
    type: object
    additionalProperties: false
    required:
      - command
      - command_class
      - default_authority_boundary
      - required_arguments
      - optional_arguments
      - effect_summary
      - safety_notes
    properties:
      command:
        $ref: "#/$defs/commandName"
      command_class:
        $ref: "#/$defs/commandClass"
      default_authority_boundary:
        $ref: "#/$defs/authorityBoundary"
      required_arguments:
        $ref: "#/$defs/stringList"
      optional_arguments:
        $ref: "#/$defs/stringList"
      arguments:
        type: array
        items:
          $ref: "#/$defs/argumentDefinition"
      effect_summary:
        type: string
        minLength: 1
      safety_notes:
        $ref: "#/$defs/stringList"
      prohibited_effects:
        $ref: "#/$defs/stringList"
