decision_text: Preserve MADP v0.3.0-alpha.3 as the experimental baseline and defer
  an independent alpha.4 implementation. Specify a Core Candidate Profile and a human-facing
  Workflow Macro layer on alpha.3, then compare them with the standard alpha.3 workflow,
  ordinary manual multi-AI comparison, and a Markdown-plus-validator workflow before
  deciding whether alpha.4 should begin.
accepted_directions:
- id: CORE-NO-METERED-DEPENDENCY
  statement: MADP Core use, implementation, and conformance testing must not require
    a metered API or paid agent-orchestration service. Manual copy-and-paste and local
    validation are first-class mechanisms.
- id: CORE-HUMAN-FINAL-AUTHORITY
  statement: Human final authority remains mandatory.
- id: CORE-BLIND-FIRST-ROUND
  statement: Blind First Round is a Core requirement for multi-participant deliberation
    and covers direct cross-participant exposure within the MADP session. A compromised
    round may be retained as ordinary review evidence but must not be represented
    as a conforming blind round.
- id: CORE-COMMAND-LAYERS
  statement: Preserve fine-grained canonical commands as the machine layer and add
    a small, non-atomic human-facing Workflow Macro layer that expands into recorded
    canonical commands and explicit gates.
- id: CORE-CLAIM-MIGRATION
  statement: Separate speech form from verification status, but do not remove the
    existing FACT representation until replacement schemas, invariants, and migration
    tests are available.
- id: CORE-EVIDENCE-MULTIAXIS
  statement: Evidence assessment remains multidimensional; a single composite evidence
    score is not a Core requirement.
- id: CORE-PROVENANCE-TIERS
  statement: Core retains minimum protocol and source binding. The complete validation
    receipt chain remains an Assured or formal field-trial requirement.
- id: CORE-DISSENT-DISPOSITION
  statement: Preserve whether dissent remains unresolved separately from how a human
    dispositioned or overrode it.
