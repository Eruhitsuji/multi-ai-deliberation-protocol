release_notes:
- Automated evidence does not substitute for human usability evidence.
- PR
- The next formal field trial must pin the exact checked-out main commit used by the
  collector.
- Exploratory trials
- DEC-MADP-CORE-001 preserves alpha.3 as the experimental baseline, defers alpha.4,
  and authorizes a Core Candidate and Workflow Macro comparison experiment.
- The Core Candidate experiment has no release-gate effect and does not authorize
  tagging, release, publication, or Pages promotion.
- The executable Core Candidate experiment validates four-workflow comparison records,
  honest Blind First Round degradation, and non-destructive Claim and Evidence migration
  candidates.
- Evidence-integrity tests recompute Blind eligibility counts, require exact workflow
  coverage and alpha.3 commit parity, and reject broken Claim/Evidence backlinks or
  duplicate source-FACT migrations.
- Experimental comparison artifacts always remain formal_release_evidence false and
  cannot set alpha4_authorized true.
- The experimental compact bundle packages the Core Candidate sources into one deterministic
  commit-bound Markdown file and companion manifest, but it is not a PROTOCOL_LOAD_REPORT
  or formal FIELD_TRIAL evidence.
- Dynamic role planning is deterministic and advisory; it records service capabilities,
  usage preferences, independence groups, known correlation, degraded Blind plans,
  and never grants approval authority.
- Field-trial defects now require explicit session-start, exact authority-sensitive
  arguments, and machine validation receipts.
- Receipt IDs alone are not evidence; release checking recomputes report, artifact,
  schema, start-profile, and raw-observation hashes.
- Formal evidence uses results_version 6 and MADP-FIELD-TRIAL-EVIDENCE-v2.
- Load reports, profile bindings, receipts, and raw-observation inventories are stored
  once per run; scenario rows reference run and observation IDs.
- MADP-FIELD-TRIAL-COLLECTION-v1 prepares DRAFT or READY run packages, copies and
  hashes observations, rebuilds receipts, and merges READY packages without sign-off.
- Collection package check and merge revalidate the complete report, receipt, schema,
  profile, commit, observation, run, and scenario reference chain.
- Collection merge rejects signed or PASS results, duplicate participant/run identities,
  duplicate destinations, and conflicting run, trial, participant, or receipt records.
- Collection-package tests cover successful preparation and merge, receipt/profile/run-reference
  tampering, duplicate-run and duplicate-destination rejection, raw-observation tampering,
  signed-base rejection, and DRAFT rejection.
- Results-version 5 evidence remains historical input and must be migrated before
  release use; conflicting run-level evidence fails closed.
- The release-only usability path exercises a valid run-normalized chain, raw-observation
  hash tampering, and unknown-observation rejection in CI.
- Existing field-trial observations remain historical evidence, but release metrics
  must be recollected against the run-normalized receipt-hardened commit.
- Advanced profiles are optional and do not weaken core authority or release gates.
- Alpha.3 is available from main for experimental field use but is not release-ready.
- Practical-use observations and defects must be recorded against the tested commit.
- Current published bootstrap remains alpha.2 until alpha.3 release authorization.
- No tag, release, or Pages promotion is authorized while field trial is in progress.
- EXP-CODEX-PILOT-001 was terminated early by Human Final Authority for resource and
  workflow cost; this is not recorded as an experiment failure.
- Only ALPHA3_CORE_CANDIDATE completed; MARKDOWN_VALIDATOR, MANUAL_MULTI_AI, and STANDARD_ALPHA3
  were cancelled before execution.
- The Core Candidate result is retained as a single-case study; no four-workflow comparative
  conclusion is authorized.
- Rapid Prerelease policy MADP-RAPID-PRERELEASE-v1 authorizes v0.3.0-alpha.4 implementation
  and prerelease preparation as a separate Human Final Authority development decision,
  not as a comparison-experiment result.
- A3-REL-001 and A3-REL-005 remain stable-release/readiness gates and are not prerelease
  hard gates.
