release_notes:
  - Automated evidence does not substitute for human usability evidence.
  - integration_status describes the alpha.3 baseline already on main; the hardening and collection changes in this file remain pending in PR #11.
  - Field-trial defects now require explicit session-start, exact authority-sensitive arguments, and machine validation receipts.
  - Receipt IDs alone are not evidence; release checking recomputes report, artifact, schema, start-profile, and raw-observation hashes.
  - Formal evidence uses results_version 6 and MADP-FIELD-TRIAL-EVIDENCE-v2.
  - Load reports, profile bindings, receipts, and raw-observation inventories are stored once per run; scenario rows reference run and observation IDs.
  - MADP-FIELD-TRIAL-COLLECTION-v1 prepares DRAFT or READY run packages, copies and hashes observations, rebuilds receipts, and merges READY packages without sign-off.
  - Collection package check and merge revalidate the complete report, receipt, schema, profile, commit, observation, run, and scenario reference chain.
  - Collection merge rejects signed or PASS results, duplicate participant/run identities, duplicate destinations, and conflicting run, trial, participant, or receipt records.
  - Collection-package tests cover successful preparation and merge, receipt/profile/run-reference tampering, duplicate-run and duplicate-destination rejection, raw-observation tampering, signed-base rejection, and DRAFT rejection.
  - Results-version 5 evidence remains historical input and must be migrated before release use; conflicting run-level evidence fails closed.
  - The release-only usability path exercises a valid run-normalized chain, raw-observation hash tampering, and unknown-observation rejection in CI.
  - Existing field-trial observations remain historical evidence, but release metrics must be recollected against the run-normalized receipt-hardened commit.
  - Advanced profiles are optional and do not weaken core authority or release gates.
  - Alpha.3 is available from main for experimental field use but is not release-ready.
  - Practical-use observations and defects must be recorded against the tested commit.
  - Current published bootstrap remains alpha.2 until alpha.3 release authorization.
  - No tag, release, or Pages promotion is authorized while field trial is in progress.
