status_version: 8
protocol_version: MADP-v0.3.0-alpha.3
implementation_status: RELEASE_CANDIDATE_CONTENT_READY
integration_status: MERGED_TO_MAIN
evaluation_status: FIELD_TRIAL_IN_PROGRESS
content_ready: true
release_ready: false
tagged: false
published: false
theme: Field-Trial Hardening, Receipt-Bound Evidence, and Advanced Profiles
validation_policy:
  self_attestation_is_release_evidence: false
  machine_generated_evidence_manifest_required: true
  evidence_must_match_current_checker_and_input_hashes: true
  artifact_validation_receipt_required: true
  receipt_chain_must_be_recomputed: true
  raw_observation_hash_required_for_release_trials: true
required_automated_checks:
  - id: A3-CHECK-IMPLEMENTATION
    command: python scripts/check_alpha3_implementation.py
  - id: A3-CHECK-HARDENING
    command: python scripts/check_alpha3_hardening.py
  - id: A3-CHECK-RECEIPT
    command: python scripts/test_validation_receipt_v030_alpha3.py
  - id: A3-CHECK-MIGRATION
    command: python scripts/check_alpha3_migration.py
  - id: A3-CHECK-TRANSLATION
    command: python scripts/check_alpha3_translation.py
  - id: A3-CHECK-USABILITY
    command: python scripts/check_alpha3_usability.py
  - id: A3-CHECK-PARSER
    command: python scripts/test_command_parser_v030_alpha3.py
  - id: A3-CHECK-COMMAND-COVERAGE
    command: python scripts/check_all_commands_v030_alpha3.py
  - id: A3-CHECK-RUNTIME
    command: python scripts/test_command_runtime_v030_alpha3.py
release_blockers:
  - id: A3-REL-001
    status: FIELD_TRIAL_IN_PROGRESS
    title: Collect and sign off manual usability evidence from practical use
  - id: A3-REL-002
    status: DONE
    title: Complete Japanese source-freshness and marker audit
  - id: A3-REL-003
    status: DONE
    title: Generate reproducible release bootstrap, Skill packages, and schema bundles
  - id: A3-REL-004
    status: DONE
    title: Implement record fixtures and executable alpha.2-to-alpha.3 transformations
  - id: A3-REL-005
    status: WAITING_FOR_FIELD_TRIAL
    title: Run evidence-backed final-main audit after A3-REL-001 is complete
release_notes:
  - Automated evidence does not substitute for human usability evidence.
  - Field-trial defects now require explicit session-start, exact authority-sensitive arguments, and machine validation receipts.
  - Receipt IDs alone are not evidence; release checking recomputes report, artifact, schema, start-profile, and raw-observation hashes.
  - Existing field-trial observations remain historical evidence, but release metrics must be recollected against the receipt-hardened commit.
  - Advanced profiles are optional and do not weaken core authority or release gates.
  - Alpha.3 is available from main for experimental field use but is not release-ready.
  - Practical-use observations and defects must be recorded against the tested commit.
  - Current published bootstrap remains alpha.2 until alpha.3 release authorization.
  - No tag, release, or Pages promotion is authorized while field trial is in progress.
