name: Validate alpha.4 Core Usability

on:
  pull_request:
    paths:
      - 'protocol/MADP-v0.3.0-alpha.4-core-usability.md'
      - 'docs/profiles/WORKFLOW_MACROS-v0.3.0-alpha.4.md'
      - 'registries/v0.3.0-alpha.4/workflow-macros.yaml'
      - 'schemas/v0.3.0-alpha.4/core-usability-record.schema.yaml'
      - 'tests/v0.3.0-alpha.4/core-usability-fixtures.yaml'
      - 'docs/planning/DEC-MADP-ALPHA4-002.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-implementation-status.yaml'
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'scripts/check_alpha4_kickoff.py'
      - 'scripts/check_alpha4_core_usability.py'
      - '.github/workflows/validate-alpha4-core-usability.yml'
  push:
    branches:
      - feature/v0.3.0-alpha.4-core-usability-slice-1
    paths:
      - 'protocol/MADP-v0.3.0-alpha.4-core-usability.md'
      - 'docs/profiles/WORKFLOW_MACROS-v0.3.0-alpha.4.md'
      - 'registries/v0.3.0-alpha.4/workflow-macros.yaml'
      - 'schemas/v0.3.0-alpha.4/core-usability-record.schema.yaml'
      - 'tests/v0.3.0-alpha.4/core-usability-fixtures.yaml'
      - 'docs/planning/DEC-MADP-ALPHA4-002.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-implementation-status.yaml'
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'scripts/check_alpha4_kickoff.py'
      - 'scripts/check_alpha4_core_usability.py'
      - '.github/workflows/validate-alpha4-core-usability.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-alpha4-core-usability:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml jsonschema

      - name: Validate alpha.4 baseline
        run: python scripts/check_alpha4_kickoff.py

      - name: Validate alpha.4 Core Usability slice
        run: python scripts/check_alpha4_core_usability.py
