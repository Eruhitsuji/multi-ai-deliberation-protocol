name: Validate alpha.4 Core Usability

on:
  pull_request:
    paths:
      - 'protocol/MADP-v0.3.0-alpha.4-core-usability.md'
      - 'docs/profiles/WORKFLOW_MACROS-v0.3.0-alpha.4.md'
      - 'registries/v0.3.0-alpha.4/workflow-macros.yaml'
      - 'schemas/v0.3.0-alpha.4/core-usability-record.schema.yaml'
      - 'tests/v0.3.0-alpha.4/core-usability-fixtures.yaml'
      - 'docs/planning/DEC-MADP-ALPHA4-002.yaml'
      - 'scripts/check_alpha4_core_usability.py'
      - '.github/workflows/validate-alpha4-core-usability.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-alpha4-core-usability:
    runs-on: ubuntu-24.04
    env:
      PUBLISHED_SOURCE_COMMIT: 3333c66b8b9873581af3f621615a7e1f7fc20e0a
    steps:
      - name: Check out immutable published source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PUBLISHED_SOURCE_COMMIT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml jsonschema

      - name: Validate published alpha.4 Core Usability artifacts
        run: |
          python scripts/check_alpha4_kickoff.py
          python scripts/check_alpha4_core_usability.py
