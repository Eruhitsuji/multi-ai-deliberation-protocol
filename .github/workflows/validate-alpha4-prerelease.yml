name: Validate alpha.4 prerelease package

on:
  pull_request:
    paths:
      - 'schemas/v0.3.0-alpha.4/**'
      - 'scripts/generate_alpha4_prerelease_package.py'
      - 'scripts/check_alpha4_prerelease_package.py'
      - 'tests/v0.3.0-alpha.4/test_prerelease_package.py'
      - '.github/workflows/validate-alpha4-prerelease.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-alpha4-prerelease:
    runs-on: ubuntu-24.04
    env:
      SOURCE_COMMIT: 3333c66b8b9873581af3f621615a7e1f7fc20e0a
      REPOSITORY_NAME: ${{ github.repository }}
    steps:
      - name: Check out immutable published source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_COMMIT }}
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml jsonschema

      - name: Validate retained alpha.4 implementation
        run: |
          python scripts/check_alpha4_kickoff.py
          python scripts/check_alpha4_core_usability.py
          python tests/v0.3.0-alpha.4/test_core_distribution.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"

      - name: Run prerelease package regression tests
        run: |
          python tests/v0.3.0-alpha.4/test_prerelease_package.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"

      - name: Generate prerelease package twice
        run: |
          python scripts/generate_alpha4_prerelease_package.py .artifacts/first \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
          python scripts/generate_alpha4_prerelease_package.py .artifacts/second \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
          diff -ru .artifacts/first .artifacts/second

      - name: Validate generated prerelease packages
        run: |
          python scripts/check_alpha4_prerelease_package.py .artifacts/first \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
          python scripts/check_alpha4_prerelease_package.py .artifacts/second \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
