name: Validate alpha.3 implementation

on:
  pull_request:

jobs:
  validate-alpha3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false
      - name: Record branch tree SHA
        run: git rev-parse HEAD^{tree} > tree-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: alpha3-tree-sha
          path: tree-sha.txt
          if-no-files-found: error
