name: Validate alpha.3 implementation

on:
  push:
    paths:
      - "README-v0.3.0-alpha.3*"
      - "protocol/*alpha.3*"
      - "schemas/v0.3.0-alpha.3/**"
      - "registries/v0.3.0-alpha.3/**"
      - "bootstrap/alpha3/**"
      - "docs/profiles/*alpha.3*"
      - "docs/planning/*alpha.3*"
      - "docs/ja/v0.3.0-alpha.3/**"
      - "docs/evaluation/*alpha.3*"
      - "docs/migration/*alpha.3*"
      - "skills/madp-*/**"
      - "dist/chatgpt/madp-*"
      - "tests/v0.3.0-alpha.3/**"
      - "scripts/*alpha3*"
      - "scripts/check_release_readiness_v030_alpha3.py"
      - ".github/workflows/validate-alpha3.yml"
  pull_request:
    paths:
      - "README-v0.3.0-alpha.3*"
      - "protocol/*alpha.3*"
      - "schemas/v0.3.0-alpha.3/**"
      - "registries/v0.3.0-alpha.3/**"
      - "bootstrap/alpha3/**"
      - "docs/profiles/*alpha.3*"
      - "docs/planning/*alpha.3*"
      - "docs/ja/v0.3.0-alpha.3/**"
      - "docs/evaluation/*alpha.3*"
      - "docs/migration/*alpha.3*"
      - "skills/madp-*/**"
      - "dist/chatgpt/madp-*"
      - "tests/v0.3.0-alpha.3/**"
      - "scripts/*alpha3*"
      - "scripts/check_release_readiness_v030_alpha3.py"
      - ".github/workflows/validate-alpha3.yml"

jobs:
  validate-alpha3:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate alpha.3 integrated implementation
        run: python scripts/check_alpha3_implementation.py

      - name: Audit Japanese translations
        run: python scripts/check_alpha3_translation.py

      - name: Validate alpha.2 to alpha.3 migration
        run: python scripts/check_alpha3_migration.py

      - name: Validate automated usability walkthrough
        run: python scripts/check_alpha3_usability.py

      - name: Generate release artifacts first pass
        run: >-
          python scripts/generate_alpha3_release_artifacts.py
          tmp/alpha3-release-a
          --repository "${{ github.repository }}"
          --source-commit "${{ github.sha }}"

      - name: Generate release artifacts second pass
        run: >-
          python scripts/generate_alpha3_release_artifacts.py
          tmp/alpha3-release-b
          --repository "${{ github.repository }}"
          --source-commit "${{ github.sha }}"

      - name: Check release artifact reproducibility
        run: diff -ru tmp/alpha3-release-a tmp/alpha3-release-b

      - name: Validate generated release artifacts
        run: >-
          python scripts/check_generated_alpha3_release_artifacts.py
          tmp/alpha3-release-a
          --source-commit "${{ github.sha }}"

      - name: Audit branch release-candidate content
        run: >-
          python scripts/check_release_readiness_v030_alpha3.py
          --allow-blockers A3-REL-001,A3-REL-005

      - name: Upload alpha.3 release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: madp-v0.3.0-alpha.3-release-candidate
          path: tmp/alpha3-release-a/
          if-no-files-found: error
