name: Validate alpha.3 implementation

on:
  workflow_dispatch:
  push:
    paths:
      - "README-v0.3.0-alpha.3*"
      - "protocol/*alpha.3*"
      - "schemas/v0.3.0-alpha.3/**"
      - "registries/v0.3.0-alpha.3/**"
      - "bootstrap/alpha3/**"
      - "docs/profiles/*alpha.3*"
      - "docs/planning/*alpha.3*"
      - "docs/ja/v0.3.0-alpha.3/**"
      - "docs/evaluation/*alpha.3*"
      - "docs/migration/*alpha.3*"
      - "skills/README.md"
      - "skills/madp-*/**"
      - "dist/chatgpt/madp-*"
      - "tests/v0.3.0-alpha.3/**"
      - "scripts/*alpha3*"
      - "scripts/*v030_alpha3*"
      - ".github/workflows/validate-alpha3.yml"
  pull_request:
    paths:
      - "README-v0.3.0-alpha.3*"
      - "protocol/*alpha.3*"
      - "schemas/v0.3.0-alpha.3/**"
      - "registries/v0.3.0-alpha.3/**"
      - "bootstrap/alpha3/**"
      - "docs/profiles/*alpha.3*"
      - "docs/planning/*alpha.3*"
      - "docs/ja/v0.3.0-alpha.3/**"
      - "docs/evaluation/*alpha.3*"
      - "docs/migration/*alpha.3*"
      - "skills/README.md"
      - "skills/madp-*/**"
      - "dist/chatgpt/madp-*"
      - "tests/v0.3.0-alpha.3/**"
      - "scripts/*alpha3*"
      - "scripts/*v030_alpha3*"
      - ".github/workflows/validate-alpha3.yml"

permissions:
  contents: write

jobs:
  sync-validated-source:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Fetch implementation branch quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_BRANCH}"
          git checkout -q -B "${HEAD_BRANCH}" FETCH_HEAD
      - name: Restore validated source files when staged
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          test -f .madp-source-sync/deliberation.schema.yaml.gz.a.b64
          test -f .madp-source-sync/deliberation.schema.yaml.gz.b.b64
          test -f .madp-source-sync/fixtures.yaml.gz.b64
          wc -c .madp-source-sync/*.b64
          cat .madp-source-sync/deliberation.schema.yaml.gz.a.b64 .madp-source-sync/deliberation.schema.yaml.gz.b.b64 | base64 --decode | gzip -dc > schemas/v0.3.0-alpha.3/deliberation.schema.yaml
          base64 --decode .madp-source-sync/fixtures.yaml.gz.b64 | gzip -dc > tests/v0.3.0-alpha.3/fixtures.yaml
          sha256sum schemas/v0.3.0-alpha.3/deliberation.schema.yaml tests/v0.3.0-alpha.3/fixtures.yaml
          echo "8e6432a99b41e0275da36881e2bad17d09e4399bd2dcf436ce033de698fbefd5  schemas/v0.3.0-alpha.3/deliberation.schema.yaml" | sha256sum --check --strict
          echo "300b41d41e08b9e9485f9e6034a5765a7c6735f9850a2f0f2cf8e861cff6b9e7  tests/v0.3.0-alpha.3/fixtures.yaml" | sha256sum --check --strict
          rm -rf .madp-source-sync
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore validated alpha.3 schema and fixtures"
          git push origin HEAD:"${HEAD_BRANCH}"

  validate-alpha3:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run checks and generate evidence
        run: >-
          python scripts/run_alpha3_validation_evidence.py
          --output tmp/alpha3-validation-evidence.yaml
          --repository-commit "${{ github.sha }}"
      - name: Generate release artifacts first pass
        run: >-
          python scripts/generate_alpha3_release_artifacts.py
          tmp/alpha3-release-a
          --repository "${{ github.repository }}"
          --source-commit "${{ github.sha }}"
          --validation-evidence tmp/alpha3-validation-evidence.yaml
      - name: Generate release artifacts second pass
        run: >-
          python scripts/generate_alpha3_release_artifacts.py
          tmp/alpha3-release-b
          --repository "${{ github.repository }}"
          --source-commit "${{ github.sha }}"
          --validation-evidence tmp/alpha3-validation-evidence.yaml
      - name: Check release artifact reproducibility
        run: diff -ru tmp/alpha3-release-a tmp/alpha3-release-b
      - name: Validate generated release artifacts
        run: >-
          python scripts/check_generated_alpha3_release_artifacts.py
          tmp/alpha3-release-a
          --source-commit "${{ github.sha }}"
      - name: Audit branch release-candidate content
        run: >-
          python scripts/check_release_readiness_v030_alpha3.py
          --evidence-manifest tmp/alpha3-validation-evidence.yaml
          --repository-commit "${{ github.sha }}"
          --release-directory-a tmp/alpha3-release-a
          --release-directory-b tmp/alpha3-release-b
          --allow-blockers A3-REL-001,A3-REL-005
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: madp-v0.3.0-alpha.3-validation-evidence
          path: tmp/alpha3-validation-evidence.yaml
          if-no-files-found: error
      - name: Upload alpha.3 release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: madp-v0.3.0-alpha.3-release-candidate
          path: tmp/alpha3-release-a/
          if-no-files-found: error
