name: Validate alpha.3 implementation

on:
  push:
    paths:
      - "README-v0.3.0-alpha.3.md"
      - "protocol/*alpha.3*"
      - "schemas/v0.3.0-alpha.3/**"
      - "registries/v0.3.0-alpha.3/**"
      - "bootstrap/alpha3/**"
      - "docs/profiles/*alpha.3*"
      - "docs/planning/*alpha.3*"
      - "skills/madp-*/**"
      - "dist/chatgpt/madp-*"
      - "tests/v0.3.0-alpha.3/**"
      - "scripts/check_alpha3_implementation.py"
      - ".github/workflows/validate-alpha3.yml"
  pull_request:
    paths:
      - "README-v0.3.0-alpha.3.md"
      - "protocol/*alpha.3*"
      - "schemas/v0.3.0-alpha.3/**"
      - "registries/v0.3.0-alpha.3/**"
      - "bootstrap/alpha3/**"
      - "docs/profiles/*alpha.3*"
      - "docs/planning/*alpha.3*"
      - "skills/madp-*/**"
      - "dist/chatgpt/madp-*"
      - "tests/v0.3.0-alpha.3/**"
      - "scripts/check_alpha3_implementation.py"
      - ".github/workflows/validate-alpha3.yml"

jobs:
  validate-alpha3:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate MADP v0.3.0-alpha.3 implementation
        id: validate
        shell: bash
        run: |
          set +e
          python scripts/check_alpha3_implementation.py > alpha3-check.log 2>&1
          code=$?
          cat alpha3-check.log
          echo "$code" > alpha3-exit-code.txt
          exit "$code"

      - name: Upload alpha.3 validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha3-validation-diagnostics
          path: |
            alpha3-check.log
            alpha3-exit-code.txt
          if-no-files-found: error
