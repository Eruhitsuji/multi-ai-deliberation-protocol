name: Publish Bootstrap Prompts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-bootstrap:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate schema and schema fixtures
        run: python scripts/validate_schema.py

      - name: Validate README examples
        run: python scripts/validate_examples.py

      - name: Validate semantic fixtures
        run: python scripts/validate_semantics.py

      - name: Validate participant response fixtures
        run: python scripts/validate_participant_response.py

      - name: Check Markdown links
        run: python scripts/check_markdown_links.py

      - name: Check document consistency
        run: python scripts/check_document_consistency.py

      - name: Check bootstrap prompts
        run: python scripts/check_bootstrap_prompts.py

      - name: Generate resolved bootstrap prompts
        run: python scripts/generate_bootstrap_prompts.py _site

      - name: Check generated bootstrap prompts
        run: python scripts/check_generated_bootstrap.py _site

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
