name: Validate alpha.4 publication handoff

on:
  pull_request:
    paths:
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'docs/planning/DEC-MADP-ALPHA4-006.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-publication-handoff-status.yaml'
      - 'schemas/v0.3.0-alpha.4/**'
      - 'scripts/generate_alpha4_publication_handoff.py'
      - 'scripts/check_alpha4_publication_handoff.py'
      - 'tests/v0.3.0-alpha.4/test_publication_handoff.py'
      - '.github/workflows/validate-alpha4-publication-handoff.yml'
  push:
    branches: [main]
    paths:
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'docs/planning/DEC-MADP-ALPHA4-006.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-publication-handoff-status.yaml'
      - 'schemas/v0.3.0-alpha.4/**'
      - 'scripts/generate_alpha4_publication_handoff.py'
      - 'scripts/check_alpha4_publication_handoff.py'
      - 'tests/v0.3.0-alpha.4/test_publication_handoff.py'
      - '.github/workflows/validate-alpha4-publication-handoff.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  validate-alpha4-publication-handoff:
    runs-on: ubuntu-24.04
    env:
      SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      SOURCE_REF_KIND: ${{ github.event_name == 'pull_request' && 'PULL_REQUEST_HEAD' || 'MERGED_MAIN' }}
      BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      REPOSITORY_NAME: ${{ github.repository }}
      TARGET_TAG: MADP-v0.3.0-alpha.4
    steps:
      - name: Check out exact source commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_COMMIT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml jsonschema

      - name: Validate retained alpha.4 release candidate
        run: |
          python scripts/check_alpha4_kickoff.py
          python scripts/check_alpha4_core_usability.py
          python tests/v0.3.0-alpha.4/test_core_distribution.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
          python tests/v0.3.0-alpha.4/test_prerelease_package.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
          python tests/v0.3.0-alpha.4/test_release_candidate.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"

      - name: Run publication handoff regression tests
        run: |
          python tests/v0.3.0-alpha.4/test_publication_handoff.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --branch-name "$BRANCH_NAME"

      - name: Generate publication handoff twice
        run: |
          python scripts/generate_alpha4_publication_handoff.py .artifacts/first \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME" \
            --target-tag "$TARGET_TAG"
          python scripts/generate_alpha4_publication_handoff.py .artifacts/second \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME" \
            --target-tag "$TARGET_TAG"
          diff -ru .artifacts/first .artifacts/second

      - name: Validate generated publication handoffs
        run: |
          python scripts/check_alpha4_publication_handoff.py .artifacts/first \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME" \
            --target-tag "$TARGET_TAG"
          python scripts/check_alpha4_publication_handoff.py .artifacts/second \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME" \
            --target-tag "$TARGET_TAG"

      - name: Verify merged-main handoff classification
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          path = Path('.artifacts/first/MADP-v0.3.0-alpha.4-publication-handoff.yaml')
          value = yaml.safe_load(path.read_text(encoding='utf-8'))
          assert value['source_ref_kind'] == 'MERGED_MAIN'
          assert value['branch_name'] == 'main'
          assert value['target_tag'] == 'MADP-v0.3.0-alpha.4'
          assert all(item is False for item in value['required_human_actions'].values())
          assert all(item is False for item in value['boundaries'].values())
          print('MERGED_MAIN publication handoff classification: PASS')
          PY

      - name: Upload alpha.4 publication handoff
        uses: actions/upload-artifact@v4
        with:
          name: madp-v0.3.0-alpha.4-publication-handoff-${{ env.SOURCE_COMMIT }}
          path: .artifacts/first/
          if-no-files-found: error
          retention-days: 30

      - name: Publish exact-main handoff commit status
        if: always() && github.event_name == 'push' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          case "$JOB_STATUS" in
            success)
              state=success
              description='MERGED_MAIN publication handoff validated'
              ;;
            failure)
              state=failure
              description='MERGED_MAIN publication handoff validation failed'
              ;;
            cancelled)
              state=error
              description='MERGED_MAIN publication handoff validation cancelled'
              ;;
            *)
              state=error
              description='MERGED_MAIN publication handoff validation incomplete'
              ;;
          esac
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state="$state" \
            -f context='madp/alpha4-publication-handoff' \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
