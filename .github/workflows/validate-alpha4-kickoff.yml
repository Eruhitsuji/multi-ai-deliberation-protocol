name: Validate alpha.4 kickoff

on:
  pull_request:
    paths:
      - 'docs/planning/DEC-MADP-ALPHA4-001.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-implementation-status.yaml'
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'scripts/check_alpha4_kickoff.py'
      - '.github/workflows/validate-alpha4-kickoff.yml'
  push:
    branches:
      - feature/v0.3.0-alpha.4-kickoff
    paths:
      - 'docs/planning/DEC-MADP-ALPHA4-001.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-implementation-status.yaml'
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'scripts/check_alpha4_kickoff.py'
      - '.github/workflows/validate-alpha4-kickoff.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-alpha4-kickoff:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate alpha.4 kickoff baseline
        run: python scripts/check_alpha4_kickoff.py
