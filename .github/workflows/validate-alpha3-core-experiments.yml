name: Validate alpha.3 Core Candidate experiments

on:
  workflow_dispatch:
  push:
    paths:
      - "schemas/v0.3.0-alpha.3/experimental/**"
      - "docs/evaluation/*core-candidate*"
      - "docs/evaluation/*blind-first-round*"
      - "docs/migration/*claim-evidence-candidate*"
      - "tests/v0.3.0-alpha.3/core-candidate-experiment-fixtures.yaml"
      - "scripts/check_alpha3_core_candidate_experiments.py"
      - "scripts/test_alpha3_core_candidate_evidence_integrity.py"
      - "docs/planning/MADP-v0.3.0-alpha.3-implementation-status.yaml"
      - ".github/workflows/validate-alpha3-core-experiments.yml"
  pull_request:
    paths:
      - "schemas/v0.3.0-alpha.3/experimental/**"
      - "docs/evaluation/*core-candidate*"
      - "docs/evaluation/*blind-first-round*"
      - "docs/migration/*claim-evidence-candidate*"
      - "tests/v0.3.0-alpha.3/core-candidate-experiment-fixtures.yaml"
      - "scripts/check_alpha3_core_candidate_experiments.py"
      - "scripts/test_alpha3_core_candidate_evidence_integrity.py"
      - "docs/planning/MADP-v0.3.0-alpha.3-implementation-status.yaml"
      - ".github/workflows/validate-alpha3-core-experiments.yml"

jobs:
  validate-core-candidate-experiments:
    runs-on: ubuntu-latest
    env:
      SOURCE_COMMIT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out experiment source commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_COMMIT }}
          show-progress: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Verify checked-out commit
        run: test "$(git rev-parse HEAD)" = "${SOURCE_COMMIT}"
      - name: Validate Core Candidate specification boundary
        run: python scripts/check_alpha3_core_candidate.py
      - name: Validate operational experiments
        run: python scripts/check_alpha3_core_candidate_experiments.py
      - name: Test evidence integrity hardening
        run: python scripts/test_alpha3_core_candidate_evidence_integrity.py
      - name: Verify experiment remains non-release evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          status = yaml.safe_load(
              Path('docs/planning/MADP-v0.3.0-alpha.3-implementation-status.yaml').read_text(encoding='utf-8')
          )
          workstream = status.get('experimental_workstreams', {}).get('core_candidate', {})
          if workstream.get('release_gate_effect') != 'NONE':
              raise SystemExit('Core Candidate experiment changed a release gate')
          if workstream.get('alpha4_implementation') != 'DEFERRED':
              raise SystemExit('alpha.4 is no longer deferred')
          checks = {
              item.get('id'): item
              for item in status.get('experimental_checks', [])
          }
          for check_id in (
              'A3-EXPERIMENT-CORE-CANDIDATE-OPERATIONS',
              'A3-EXPERIMENT-CORE-CANDIDATE-INTEGRITY',
          ):
              if checks.get(check_id, {}).get('release_evidence') is not False:
                  raise SystemExit(f'{check_id} must remain non-release evidence')
          if status.get('release_ready') is not False:
              raise SystemExit('experimental work must not set release_ready')
          PY
