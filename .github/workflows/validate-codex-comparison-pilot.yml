name: Validate Codex comparison pilot

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "experiments/codex-core-candidate-comparison/**"
      - ".github/workflows/validate-codex-comparison-pilot.yml"
      - "schemas/v0.3.0-alpha.3/experimental/core-candidate-comparison.schema.yaml"
      - "scripts/check_alpha3_core_candidate_experiments.py"
  push:
    paths:
      - "experiments/codex-core-candidate-comparison/**"
      - ".github/workflows/validate-codex-comparison-pilot.yml"
      - "schemas/v0.3.0-alpha.3/experimental/core-candidate-comparison.schema.yaml"
      - "scripts/check_alpha3_core_candidate_experiments.py"

jobs:
  validate-pilot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Validate experiment scaffold
        run: python experiments/codex-core-candidate-comparison/pilot-001/validate.py
