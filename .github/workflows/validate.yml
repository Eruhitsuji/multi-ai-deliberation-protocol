name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate rc.2 schema and schema fixtures
        run: python scripts/validate_schema.py

      - name: Validate README examples
        run: python scripts/validate_examples.py

      - name: Validate rc.2 semantic fixtures
        run: python scripts/validate_semantics.py

      - name: Validate participant response fixtures
        run: python scripts/validate_participant_response.py

      - name: Check Markdown links
        run: python scripts/check_markdown_links.py

      - name: Check document consistency
        run: python scripts/check_document_consistency.py

      - name: Check bootstrap prompts
        run: python scripts/check_bootstrap_prompts.py

      - name: Test bootstrap prompt generator
        run: python scripts/test_generate_bootstrap_prompts.py

      - name: Generate bootstrap prompt fixture
        run: >-
          python scripts/generate_bootstrap_prompts.py
          tmp/generated-bootstrap-validation
          --repository ExampleOwner/madp-fixture
          --commit-sha 0123456789abcdef0123456789abcdef01234567
          --workflow-run-id RC2_LOCAL_TEST
          --generated-by LOCAL

      - name: Check generated bootstrap prompt fixture
        run: python scripts/check_generated_bootstrap.py tmp/generated-bootstrap-validation --expect tests/generated-bootstrap/local-generation.yaml

      - name: Check v0.3 alpha traceability matrix
        run: python scripts/check_traceability_v030.py

      - name: Validate v0.3 alpha migration fixture schemas
        run: python scripts/run_schema_fixture_checks.py all --json

      - name: Validate v0.3 alpha migration invariants
        run: python scripts/check_migration_invariants_v030.py

      - name: Check generated v0.3 alpha artifacts byte-for-byte
        run: python scripts/generate_artifacts.py --check

      - name: Check canonical and generated schema equivalence
        run: python scripts/check_schema_bundle_equivalence.py

      - name: Verify MADP_JCS_V1 vectors
        run: python scripts/verify_jcs_vectors.py all --json

      - name: Protect generated artifacts from accidental edits
        run: |
          test -f schemas/generated/session-state-v0.3.0-alpha.1.bundle.schema.yaml
          test -f schemas/generated/relay-block-v0.3.0-alpha.1.bundle.schema.yaml
          test -f bootstrap/complete-protocol-bundle.txt
          test -f bootstrap/migration-fixtures-bundle.txt
