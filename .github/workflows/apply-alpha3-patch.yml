name: Apply alpha.3 final patch

on:
  pull_request:
    paths:
      - ".github/workflows/apply-alpha3-patch.yml"

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/alpha3-field-trial-hardening
          show-progress: false
      - name: Reconstruct patch diagnostics
        shell: bash
        run: |
          rm -f .alpha3-patch/chunk-081.b64
          mkdir -p /tmp/alpha3-diagnostic
          sha256sum .alpha3-patch/chunk-*.b64 > /tmp/alpha3-diagnostic/chunk-sha256.txt
          wc -c .alpha3-patch/chunk-*.b64 > /tmp/alpha3-diagnostic/chunk-sizes.txt
          cat .alpha3-patch/chunk-*.b64 > /tmp/alpha3-diagnostic/alpha3-patch.b64
          base64 -d /tmp/alpha3-diagnostic/alpha3-patch.b64 > /tmp/alpha3-diagnostic/alpha3-final-patch.tar.gz
          sha256sum /tmp/alpha3-diagnostic/alpha3-final-patch.tar.gz > /tmp/alpha3-diagnostic/archive-sha256.txt
      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: alpha3-patch-diagnostic-final
          path: /tmp/alpha3-diagnostic/
          if-no-files-found: error
      - name: Verify patch
        run: echo "24e641c672d1400acc10ef92e5e70235b7d783a891ec993c8a8c528927c687b3  /tmp/alpha3-diagnostic/alpha3-final-patch.tar.gz" | sha256sum -c -
