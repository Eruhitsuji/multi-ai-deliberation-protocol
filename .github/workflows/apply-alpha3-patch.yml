name: Apply alpha.3 final patch

on:
  pull_request:
    paths:
      - ".github/workflows/apply-alpha3-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/alpha3-field-trial-hardening
          fetch-depth: 0
          show-progress: false
      - name: Reconstruct and verify patch
        shell: bash
        run: |
          rm -f .alpha3-patch/chunk-081.b64
          cat .alpha3-patch/chunk-*.b64 > /tmp/alpha3-patch.b64
          base64 -d /tmp/alpha3-patch.b64 > /tmp/alpha3-final-patch.tar.gz
          echo "24e641c672d1400acc10ef92e5e70235b7d783a891ec993c8a8c528927c687b3  /tmp/alpha3-final-patch.tar.gz" | sha256sum -c -
          tar -xzf /tmp/alpha3-final-patch.tar.gz -C .
      - name: Remove staging helpers
        run: |
          rm -rf .alpha3-patch
          rm -f .github/workflows/apply-alpha3-patch.yml
          rm -f .github/workflows/export-alpha3-tree.yml
      - name: Commit final patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Close alpha.3 field-trial evidence chain"
          git push origin HEAD:agent/alpha3-field-trial-hardening
