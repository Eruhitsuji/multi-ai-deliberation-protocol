name: Validate alpha.4 release candidate

on:
  pull_request:
    paths:
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'docs/planning/DEC-MADP-ALPHA4-005.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-release-readiness.yaml'
      - 'schemas/v0.3.0-alpha.4/**'
      - 'scripts/generate_alpha4_release_candidate.py'
      - 'scripts/check_alpha4_release_candidate.py'
      - 'tests/v0.3.0-alpha.4/test_release_candidate.py'
      - '.github/workflows/validate-alpha4-release-candidate.yml'
  push:
    branches:
      - main
    paths:
      - 'README-v0.3.0-alpha.4.md'
      - 'docs/releases/MADP-v0.3.0-alpha.4.md'
      - 'docs/planning/DEC-MADP-ALPHA4-005.yaml'
      - 'docs/planning/MADP-v0.3.0-alpha.4-release-readiness.yaml'
      - 'schemas/v0.3.0-alpha.4/**'
      - 'scripts/generate_alpha4_release_candidate.py'
      - 'scripts/check_alpha4_release_candidate.py'
      - 'tests/v0.3.0-alpha.4/test_release_candidate.py'
      - '.github/workflows/validate-alpha4-release-candidate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-alpha4-release-candidate:
    runs-on: ubuntu-24.04
    env:
      SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      SOURCE_REF_KIND: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'MERGED_MAIN' || 'PULL_REQUEST_HEAD' }}
      BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      REPOSITORY_NAME: ${{ github.repository }}
    steps:
      - name: Check out exact source commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_COMMIT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml jsonschema

      - name: Validate retained alpha.4 implementation
        run: |
          python scripts/check_alpha4_kickoff.py
          python scripts/check_alpha4_core_usability.py
          python tests/v0.3.0-alpha.4/test_core_distribution.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"
          python tests/v0.3.0-alpha.4/test_prerelease_package.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"

      - name: Run release-candidate regression tests
        run: |
          python tests/v0.3.0-alpha.4/test_release_candidate.py \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT"

      - name: Generate release candidate twice
        run: |
          python scripts/generate_alpha4_release_candidate.py .artifacts/first \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME"
          python scripts/generate_alpha4_release_candidate.py .artifacts/second \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME"
          diff -ru .artifacts/first .artifacts/second

      - name: Validate generated release candidates
        run: |
          python scripts/check_alpha4_release_candidate.py .artifacts/first \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME"
          python scripts/check_alpha4_release_candidate.py .artifacts/second \
            --repository "$REPOSITORY_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref-kind "$SOURCE_REF_KIND" \
            --branch-name "$BRANCH_NAME"

      - name: Verify merged-main receipt classification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          receipt = yaml.safe_load(Path('.artifacts/first/MADP-v0.3.0-alpha.4-release-candidate.receipt.yaml').read_text())
          assert receipt['source_ref_kind'] == 'MERGED_MAIN'
          assert receipt['branch_name'] == 'main'
          assert receipt['main_branch_candidate'] is True
          assert receipt['status'] == 'MERGED_MAIN_CANDIDATE_VALIDATED'
          PY

      - name: Upload alpha.4 release candidate
        uses: actions/upload-artifact@v4
        with:
          name: madp-v0.3.0-alpha.4-release-candidate-${{ env.SOURCE_COMMIT }}
          path: .artifacts/first/
          if-no-files-found: error
          retention-days: 30
