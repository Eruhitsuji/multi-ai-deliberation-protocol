registry_version: MADP-COMMAND-REGISTRY-v0.3
protocol_version: MADP-v0.3.0-alpha.3
status: release-candidate-content
canonical_name_policy: lowercase-kebab-case
alias_policy:
  aliases_are_input_convenience_only: true
  canonical_command_must_be_recorded: true
  aliases_must_not_change_authority: true
  unknown_or_ambiguous_alias: DENY_AND_SHOW_HELP
command_groups:
- group: SESSION
  purpose: Start, inspect, checkpoint, resume, export, import, and end sessions.
- group: PLANNING
  purpose: Define and confirm goals and scope.
- group: PARTICIPANT
  purpose: Register participants and capabilities.
- group: ROLE
  purpose: Manage temporary analytical roles.
- group: RELAY
  purpose: Create bounded relays for external participants.
- group: INGESTION
  purpose: Preserve, classify, normalize, and confirm received responses.
- group: EVIDENCE
  purpose: Track and verify claims.
- group: RECORDS
  purpose: Generate, review, approve, redact, and export records.
- group: TEAM
  purpose: Record explicit team approvals.
- group: HELP
  purpose: Provide protocol support without state authority.
- group: PORTABILITY
  purpose: Validate user-managed session files and handoffs.
aliases:
- alias: start
  command: session-start
- alias: status
  command: session-status
- alias: checkpoint
  command: session-checkpoint-create
- alias: save
  command: session-export
- alias: backup
  command: session-export
- alias: load
  command: session-import
- alias: restore
  command: session-import
- alias: resume
  command: session-resume
- alias: end
  command: session-end
- alias: minutes
  command: minutes-generate
- alias: export-minutes
  command: minutes-export
commands:
- command: session-start
  group: SESSION
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - deliberation_plan
  effect_summary: Start a session from a confirmed request without inferring approval
    for later decisions.
  safety_notes:
  - Starting a session grants no execution authority.
  prohibited_effects:
  - Implicit approval.
  - External execution.
- command: session-status
  group: SESSION
  command_class: SESSION_COMMAND
  default_authority_boundary: REFERENCE_ONLY
  required_arguments: []
  effect_summary: Summarize the current phase, state version, blockers, and next action
    without changing state.
  safety_notes:
  - Status output is descriptive only.
  prohibited_effects:
  - Canonical state mutation.
  - Invented progress.
- command: session-checkpoint-create
  group: SESSION
  command_class: RECORD_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - label
  effect_summary: Create a checkpoint record for backup, comparison, or later export.
  safety_notes:
  - A checkpoint does not replace canonical state.
  prohibited_effects:
  - Silent state replacement.
  - External disclosure.
- command: session-resume
  group: SESSION
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - session_id
  effect_summary: Resume the prior phase without creating new authority.
  safety_notes:
  - Resume restores prior boundaries only.
  prohibited_effects:
  - New execution permission.
  - Silent state replacement.
- command: session-export
  group: PORTABILITY
  command_class: RECORD_COMMAND
  default_authority_boundary: REQUIRES_USER_CONFIRMATION
  required_arguments:
  - session_export_request
  effect_summary: Prepare a portable session file or bundle using the requested profile
    and privacy settings.
  safety_notes:
  - Private content requires explicit confirmation.
  - Export does not approve session content.
  prohibited_effects:
  - Unauthorized disclosure.
  - Implicit execution permission.
- command: session-import
  group: PORTABILITY
  command_class: PORTABILITY_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - source_file
  effect_summary: Read and validate a supplied session file while preserving the source
    unchanged.
  safety_notes:
  - Import analysis cannot modify canonical state.
  prohibited_effects:
  - Silent merge.
  - Authority escalation.
- command: session-import-confirm
  group: PORTABILITY
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - import_id
  - selected_action
  effect_summary: Confirm one reviewed import proposal for a specific source and revision.
  safety_notes:
  - Confirmation applies only to the referenced import report.
  prohibited_effects:
  - Importing a different file.
  - Bypassing failed authority validation.
- command: session-end
  group: SESSION
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - session_id
  - end_reason
  effect_summary: End the active session and preserve unresolved items and final records.
  safety_notes:
  - Ending a session is not approval of unresolved proposals.
  prohibited_effects:
  - Deleting records.
  - External execution.
- command: participant-add
  group: PARTICIPANT
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - participant_profile
  effect_summary: Register a participant without granting undeclared authority.
  safety_notes:
  - Participant registration is not an authority grant.
  prohibited_effects:
  - Implicit approval.
  - External execution.
- command: participant-update-capability
  group: PARTICIPANT
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - participant_id
  - capabilities
  effect_summary: Update observed capability metadata while preserving UNKNOWN values.
  safety_notes:
  - Capability observation does not grant authority.
  prohibited_effects:
  - Inventing unsupported capabilities.
  - External execution.
- command: participant-set-mode
  group: PARTICIPANT
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - participant_id
  - participation_mode
  effect_summary: Set participation mode and enforce role restrictions.
  safety_notes:
  - OPINION_ONLY cannot become an authority role.
  prohibited_effects:
  - Authority escalation.
  - External execution.
- command: goal-propose
  group: PLANNING
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - deliberation_plan
  effect_summary: Propose or amend a deliberation goal.
  safety_notes:
  - A proposed goal is not confirmed.
  prohibited_effects:
  - Silent goal replacement.
  - Implicit approval.
- command: goal-confirm
  group: PLANNING
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - plan_id
  - revision
  effect_summary: Confirm one specific goal revision.
  safety_notes:
  - Confirmation applies only to the referenced revision.
  prohibited_effects:
  - Confirmation of a different revision.
  - External execution.
- command: role-assign
  group: ROLE
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - role_assignment
  effect_summary: Assign an analytical role within the role budget.
  safety_notes:
  - Analytical roles do not change authority roles.
  prohibited_effects:
  - Changing an approver or decision owner.
  - External execution.
- command: role-pause
  group: ROLE
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - role_id
  effect_summary: Pause an analytical role without changing authority.
  safety_notes:
  - Pause preserves role history.
  prohibited_effects:
  - Deleting role history.
  - Authority escalation.
- command: role-retire
  group: ROLE
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - role_id
  - reason
  effect_summary: Retire an unnecessary analytical role.
  safety_notes:
  - Retirement does not remove prior findings.
  prohibited_effects:
  - Deleting dissent.
  - Changing authority roles.
- command: relay-create-plain
  group: RELAY
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - plain_relay_packet
  effect_summary: Create a natural-language relay for a limited participant.
  safety_notes:
  - Plain relay is not a permission grant.
  prohibited_effects:
  - Implicit approval.
  - Canonical state authority.
- command: response-ingest
  group: INGESTION
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - raw_response_ref
  - participant_id
  effect_summary: Preserve and classify a received response.
  safety_notes:
  - The raw response must be retained.
  prohibited_effects:
  - Silent rewriting.
  - Authority escalation.
- command: response-normalize
  group: INGESTION
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - ingest_id
  - normalization_record
  effect_summary: Create an auditable interpretation without adding authority.
  safety_notes:
  - Normalization must not invent evidence or confidence.
  prohibited_effects:
  - Invented approval.
  - Invented sources.
- command: normalization-confirm
  group: INGESTION
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - normalization_id
  - status
  effect_summary: Confirm or reject a proposed normalization.
  safety_notes:
  - Confirmation does not approve the underlying proposal.
  prohibited_effects:
  - Decision approval.
  - External execution.
- command: claim-add
  group: EVIDENCE
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - claim
  effect_summary: Add a typed claim to the claim ledger.
  safety_notes:
  - Claim type and provenance must be explicit.
  prohibited_effects:
  - Treating an unverified claim as verified.
  - Implicit approval.
- command: claim-verify
  group: EVIDENCE
  command_class: AI_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - claim_id
  - verification_status
  effect_summary: Record verification work without fabricating sources.
  safety_notes:
  - Verification must identify its basis.
  prohibited_effects:
  - Fabricated evidence.
  - External execution.
- command: minutes-generate
  group: RECORDS
  command_class: RECORD_COMMAND
  default_authority_boundary: PROPOSE_ONLY
  required_arguments:
  - detail_level
  effect_summary: Generate draft minutes from recorded state.
  safety_notes:
  - Generated minutes are drafts.
  prohibited_effects:
  - Automatic minutes approval.
  - Disclosure of private input.
- command: minutes-review
  group: RECORDS
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - minutes_id
  - review_status
  effect_summary: Record human review of a minutes revision.
  safety_notes:
  - Review and approval are separate states.
  prohibited_effects:
  - Approval of another revision.
  - External execution.
- command: minutes-approve
  group: RECORDS
  command_class: USER_COMMAND
  default_authority_boundary: USER_CONFIRMED
  required_arguments:
  - minutes_id
  - revision
  effect_summary: Approve a specific minutes revision as a record.
  safety_notes:
  - Minutes approval does not approve every proposal described.
  prohibited_effects:
  - Decision inference.
  - External execution.
- command: minutes-redact
  group: RECORDS
  command_class: RECORD_COMMAND
  default_authority_boundary: REQUIRES_USER_CONFIRMATION
  required_arguments:
  - minutes_id
  - redactions
  effect_summary: Redact permitted content while preserving an audit note.
  safety_notes:
  - Redaction must not silently alter decisions.
  prohibited_effects:
  - Erasing dissent history.
  - Unauthorized disclosure.
- command: minutes-export
  group: RECORDS
  command_class: RECORD_COMMAND
  default_authority_boundary: REQUIRES_USER_CONFIRMATION
  required_arguments:
  - minutes_id
  - format
  effect_summary: Export a selected minutes revision as a user-managed file.
  safety_notes:
  - Exported minutes preserve status and revision.
  prohibited_effects:
  - Exporting private content without confirmation.
  - Changing approval status.
- command: help
  group: HELP
  command_class: HELP_COMMAND
  default_authority_boundary: REFERENCE_ONLY
  required_arguments:
  - question
  effect_summary: Enter protocol support without modifying deliberation state.
  safety_notes:
  - Help does not participate in substantive decisions.
  prohibited_effects:
  - Canonical state mutation.
  - Decision approval.
- command: help-context-create
  group: HELP
  command_class: HELP_COMMAND
  default_authority_boundary: REFERENCE_ONLY
  required_arguments:
  - help_context_packet
  effect_summary: Create minimal context for a separate Help chat.
  safety_notes:
  - Share only necessary and permitted context.
  prohibited_effects:
  - Private data disclosure.
  - Authority transfer.
- command: team-approval-record
  group: TEAM
  command_class: TEAM_COMMAND
  default_authority_boundary: REQUIRES_USER_CONFIRMATION
  required_arguments:
  - decision_id
  - approver_id
  - decision_revision
  effect_summary: Record a named human approval under the selected team policy.
  safety_notes:
  - Silence never counts as consent.
  prohibited_effects:
  - Fabricated approver identity.
  - Approval of another revision.
